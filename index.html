<!DOCTYPE html>
<html class="dark" lang="zh-TW">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>TianDao Flow Controller</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script async defer src="https://accounts.google.com/gsi/client"></script>
    <script async defer src="https://apis.google.com/js/api.js"></script>
    
    <style>
        .glass-panel { background: rgba(21, 29, 30, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(132, 148, 149, 0.1); }
        .scanline { width: 100%; height: 2px; background: rgba(0, 219, 231, 0.05); position: absolute; top: 0; animation: scan 8s linear infinite; z-index: 10; pointer-events: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .cyan-glow { box-shadow: 0 0 15px rgba(0, 219, 231, 0.15); }
        .active-nav-item { color: #00f2ff; border-top: 2px solid #00f2ff; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #080f10; }
        ::-webkit-scrollbar-thumb { background: #3a494b; border-radius: 2px; }
        
        #main-app-content { opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
        #main-app-content.unlocked { opacity: 1; pointer-events: auto; }
        .secure-mask { position: fixed; inset: 0; background: #080f10; z-index: 40; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #00dbe7; font-family: 'JetBrains Mono', monospace; font-size: 12px; transition: opacity 0.5s ease; gap: 10px; }
        .secure-mask.hidden-mask { opacity: 0; pointer-events: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .tab-active { border-bottom: 2px solid #00f2ff; color: #00f2ff; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: {
                "on-primary-fixed": "#002022", "surface-container-low": "#151d1e", "inverse-on-surface": "#2a3232",
                "on-primary-container": "#006a71", "surface-tint": "#00dbe7", "secondary-fixed": "#e5e2e1",
                "primary-fixed": "#74f5ff", "surface-container-lowest": "#080f10", "on-secondary-container": "#bab8b7",
                "surface": "#0d1515", "error-container": "#93000a", "surface-container-highest": "#2e3637",
                "surface-dim": "#0d1515", "inverse-primary": "#00696f", "on-secondary": "#313030",
                "primary-fixed-dim": "#00dbe7", "on-tertiary-fixed": "#291800", "on-surface-variant": "#b9cacb",
                "on-tertiary": "#452b00", "tertiary-container": "#ffd49d", "on-surface": "#dce4e4",
                "on-error-container": "#ffdad6", "tertiary": "#fff6ef", "surface-container": "#192122",
                "background": "#0d1515", "on-primary": "#00363a", "on-primary-fixed-variant": "#004f54",
                "on-error": "#690005", "error": "#ffb4ab", "on-secondary-fixed": "#1c1b1b",
                "on-tertiary-container": "#845600", "surface-container-high": "#232b2c", "secondary": "#c9c6c5",
                "on-tertiary-fixed-variant": "#633f00", "secondary-container": "#4a4949", "primary": "#e1fdff",
                "tertiary-fixed": "#ffddb4", "on-secondary-fixed-variant": "#474646", "tertiary-fixed-dim": "#ffb952",
                "on-background": "#dce4e4", "surface-bright": "#333b3b", "primary-container": "#00f2ff",
                "secondary-fixed-dim": "#c9c6c5", "inverse-surface": "#dce4e4", "outline-variant": "#3a494b",
                "outline": "#849495", "surface-variant": "#2e3637"
            }, spacing: { "gutter": "16px" }, fontFamily: { "body-lg": ["Inter"], "label-caps": ["JetBrains Mono"], "data-md": ["JetBrains Mono"] } } }
        };
    </script>
</head>
<body class="bg-background text-on-surface font-body-lg overflow-hidden h-screen flex flex-col">

<div id="secure-mask" class="secure-mask">
    <span class="material-symbols-outlined text-4xl animate-pulse">terminal</span>
    <div id="mask-status">SYSTEM_LOCKED :: WAITING_FOR_AUTH</div>
</div>

<header class="fixed top-0 w-full z-50 flex justify-between items-center px-4 h-14 bg-surface border-b border-outline-variant">
    <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-primary-fixed-dim text-[20px]">terminal</span>
        <h1 class="font-label-caps text-[10px] tracking-wider text-primary-fixed-dim uppercase leading-none">TianDao Flow Controller</h1>
    </div>
    <div class="flex items-center gap-3">
        <button class="bg-primary-container text-on-primary-fixed px-3 h-8 rounded-sm font-label-caps text-[10px] flex items-center gap-1 hover:opacity-90 active:scale-95 transition-all cyan-glow" id="auth-btn">
            <span class="material-symbols-outlined text-[16px]">account_circle</span>
            <span id="auth-btn-text">LOGIN</span>
        </button>
    </div>
</header>

<div id="main-app-content" class="flex-1 mt-14 mb-16 overflow-y-auto relative flex flex-col hide-scrollbar">
    <div class="scanline"></div>
    <div id="view-container" class="flex-1 flex flex-col"></div>
</div>

<nav class="fixed bottom-0 w-full h-16 bg-surface-container border-t border-outline-variant flex items-center justify-around px-2 z-50">
    <button class="nav-btn flex flex-col items-center gap-1 text-on-surface-variant pt-2 pb-1 px-3" data-view="system">
        <span class="material-symbols-outlined text-[22px]">settings_input_component</span>
        <span class="font-label-caps text-[9px] uppercase">System</span>
    </button>
    <button class="nav-btn flex flex-col items-center gap-1 text-on-surface-variant pt-2 pb-1 px-3" data-view="modules">
        <span class="material-symbols-outlined text-[22px]">database</span>
        <span class="font-label-caps text-[9px] uppercase">Modules</span>
    </button>
    <button class="nav-btn flex flex-col items-center gap-1 text-on-surface-variant pt-2 pb-1 px-3" data-view="outline">
        <span class="material-symbols-outlined text-[22px]">edit_document</span>
        <span class="font-label-caps text-[9px] uppercase">Outline</span>
    </button>
    <button class="nav-btn flex flex-col items-center gap-1 text-on-surface-variant pt-2 pb-1 px-3" data-view="triggers">
        <span class="material-symbols-outlined text-[22px]">psychology</span>
        <span class="font-label-caps text-[9px] uppercase">Triggers</span>
    </button>
</nav>

<div id="modal-container" class="hidden"></div>

<script>
    const TDF_CONFIG = {
        CLIENT_ID: '113481234677-vhtkocf6nsp7pm47figsdgm6vsdqlrea.apps.googleusercontent.com', 
        SCOPES: 'https://www.googleapis.com/auth/drive',
        DISCOVERY_DOCS: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
        WORKSPACE_ROOT: 'TianDao_Workspace',
        CORE_PATH: '01_CENTRAL_CORE'
    };

    const MOD_CATEGORIES = [
        { key: "System", path: "00_SYSTEM", label: "AI提示詞" },
        { key: "Chars", path: "01_CHARACTERS", label: "人物" },
        { key: "Scenes", path: "02_SCENES", label: "場景" },
        { key: "Actions", path: "03_ACTIONS", label: "行為" },
        { key: "Speech", path: "04_SPEECH", label: "常用語" },
        { key: "Clothing", path: "05_CLOTHING", label: "服裝" },
        { key: "Items", path: "06_ITEMS", label: "道具" },
        { key: "Physical", path: "07_PHYSICAL", label: "身體狀態" },
        { key: "Mental", path: "08_MENTAL", label: "精神狀態" },
        { key: "DID", path: "09_DID_SYSTEM", label: "多重人格" }
    ];

    const state = {
        tokenClient: null, gapiInited: false, gisInited: false,
        driveIds: { root: null, core: null },
        moduleData: {}, 
        outlineData: {
            chapter: '001', version: 'V1.0', coreEvent: '',
            tabs: Array(4).fill(null).map(() => ({ scene: '', actionText: '', characters: {} }))
        },
        currentView: 'system',
        currentTab: 0,
        isInitialized: false
    };

    // --- Google API Initialization ---
    function gapiLoaded() { gapi.load('client', initializeGapiClient); }
    async function initializeGapiClient() {
        await gapi.client.init({ discoveryDocs: TDF_CONFIG.DISCOVERY_DOCS });
        state.gapiInited = true;
    }
    function gisLoaded() {
        state.tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: TDF_CONFIG.CLIENT_ID, scope: TDF_CONFIG.SCOPES, callback: '',
        });
        state.gisInited = true;
    }

    // --- Drive API Wrapper ---
    const DriveAPI = {
        async findId(name, parentId = null, isFolder = true) {
            const mime = isFolder ? "mimeType = 'application/vnd.google-apps.folder'" : "mimeType != 'application/vnd.google-apps.folder'";
            let q = `name = '${name}' and ${mime} and trashed = false`;
            if (parentId) q += ` and '${parentId}' in parents`;
            const resp = await gapi.client.drive.files.list({ q: q, fields: 'files(id, name)' });
            return resp.result.files.length > 0 ? resp.result.files[0].id : null;
        },
        async createFolder(name, parentId) {
            const token = gapi.client.getToken().access_token;
            const metadata = { name, parents: parentId ? [parentId] : [], mimeType: 'application/vnd.google-apps.folder' };
            const resp = await fetch('https://www.googleapis.com/drive/v3/files', {
                method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(metadata)
            });
            return resp.json();
        },
        async createFile(name, parentId, content) {
            const token = gapi.client.getToken().access_token;
            const metadata = { name, parents: parentId ? [parentId] : [], mimeType: 'text/plain' };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', new Blob([content], { type: 'text/plain' }));
            const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: form
            });
            return resp.json();
        },
        async getFileContent(fileId) {
            const resp = await gapi.client.drive.files.get({ fileId: fileId, alt: 'media' });
            return resp.body;
        },
        async updateFile(fileId, content) {
            const token = gapi.client.getToken().access_token;
            const metadata = { mimeType: 'text/plain' };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', new Blob([content], { type: 'text/plain' }));
            const resp = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`, {
                method: 'PATCH', headers: { 'Authorization': `Bearer ${token}` }, body: form
            });
            return resp.json();
        },
        async listFiles(parentId) {
            const q = `'${parentId}' in parents and trashed = false`;
            const resp = await gapi.client.drive.files.list({ q: q, fields: 'files(id, name)' });
            return resp.result.files || [];
        }
    };

    // --- Module Loader & Parser ---
    const ModuleLoader = {
        parseModule(content, filename) {
            const codeMatch = content.match(/^\s*\[([A-Za-z0-9_]+)\]\s*/m);
            const code = codeMatch ? codeMatch[1] : filename.replace('.txt', '');
            const extractField = (fieldName) => {
                const regex = new RegExp(`^\\s*${fieldName}\\s*[:：]\\s*(.*?)(?=\\r?\\n\\s*[A-Z_]+\\s*[:：]|\\r?\\n\\s*\\[|\\Z)`, 'ms');
                const match = content.match(regex);
                return match ? match[1].trim() : '';
            };
            return {
                code, name: extractField('NAME') || filename.replace('.txt', ''),
                description: extractField('DESCRIPTION'), weight: parseFloat(extractField('WEIGHT')) || 0.5,
                blockedBy: extractField('BLOCKED_BY'), alternatives: extractField('ALTERNATIVES'),
                duration: extractField('DURATION_TTL') || extractField('DURATION'), rawContent: content
            };
        },
        async loadAll() {
            const coreId = state.driveIds.core;
            if (!coreId) return;
            state.moduleData = {};
            for (const cat of MOD_CATEGORIES) {
                const catId = await DriveAPI.findId(cat.path, coreId, true);
                if (!catId) continue;
                const files = await DriveAPI.listFiles(catId);
                state.moduleData[cat.key] = [];
                for (const file of files) {
                    if (file.name.endsWith('.txt') && file.name !== 'README.txt') {
                        try {
                            const content = await DriveAPI.getFileContent(file.id);
                            const parsed = this.parseModule(content, file.name);
                            parsed.fileId = file.id;
                            parsed.category = cat.key;
                            state.moduleData[cat.key].push(parsed);
                        } catch (e) { console.error(`Error loading ${file.name}`, e); }
                    }
                }
            }
        }
    };

    // --- Environment Setup ---
    const EnvSetup = {
        async initialize() {
            const mask = document.getElementById('mask-status');
            mask.innerText = 'CREATING_ROOT...';
            let rootId = await DriveAPI.findId(TDF_CONFIG.WORKSPACE_ROOT, null, true);
            if (!rootId) {
                const res = await DriveAPI.createFolder(TDF_CONFIG.WORKSPACE_ROOT, null);
                rootId = res.id;
            }
            state.driveIds.root = rootId;

            mask.innerText = 'CREATING_CORE...';
            let coreId = await DriveAPI.findId(TDF_CONFIG.CORE_PATH, rootId, true);
            if (!coreId) {
                const res = await DriveAPI.createFolder(TDF_CONFIG.CORE_PATH, rootId);
                coreId = res.id;
            }
            state.driveIds.core = coreId;

            for (const cat of MOD_CATEGORIES) {
                mask.innerText = `SYNCING ${cat.label}...`;
                let catId = await DriveAPI.findId(cat.path, coreId, true);
                if (!catId) {
                    await DriveAPI.createFolder(cat.path, coreId);
                }
            }
            
            // Create minimal example files
            const sysId = await DriveAPI.findId('00_SYSTEM', coreId, true);
            if (sysId && !(await DriveAPI.findId('00_SYSTEM_RULES.txt', sysId, false))) {
                await DriveAPI.createFile('00_SYSTEM_RULES.txt', sysId, `[SYSTEM_RULES_TIAN_DAO]\n// 天道流最高指導原則\n【源頭阻斷】：若大綱動作與模組的 [BLOCKED_BY] 衝突，必須自動觸發源頭阻斷。\n【雙軌生成】：每次回覆必須包含文學軌與視覺軌 (<sd_prompt>)。`);
            }

            const charId = await DriveAPI.findId('01_CHARACTERS', coreId, true);
            if (charId && !(await DriveAPI.findId('CHAR_YEC_BASE.txt', charId, false))) {
                await DriveAPI.createFile('CHAR_YEC_BASE.txt', charId, `[CHAR_YEC_BASE]\nNAME: 葉辰 (Ye Chen)\nAGE: 24\nAPPEARANCE: 黑色碎髮，眼神銳利。\nVISUAL_ANCHOR: (1boy:1.2), (Ye Chen:1.3)`);
            }

            const actId = await DriveAPI.findId('03_ACTIONS', coreId, true);
            if (actId && !(await DriveAPI.findId('ACT_PRECISE_SHOOT.txt', actId, false))) {
                await DriveAPI.createFile('ACT_PRECISE_SHOOT.txt', actId, `[ACT_PRECISE_SHOOT]\nNAME: 精準射擊\nREQUIRES: [STATE_VISION_NORMAL]\nBLOCKED_BY: [PHYS_BLIND_RIGHT_EYE]\nALTERNATIVES: [ALT_1: 聽聲辨位]`);
            }

            const physId = await DriveAPI.findId('07_PHYSICAL', coreId, true);
            if (physId && !(await DriveAPI.findId('PHYS_BLIND_RIGHT_EYE.txt', physId, false))) {
                await DriveAPI.createFile('PHYS_BLIND_RIGHT_EYE.txt', physId, `[PHYS_BLIND_RIGHT_EYE]\nNAME: 右眼失明\nEFFECT: 右眼完全喪失視覺。\nDURATION_TTL: 3 Chapters\nBLOCKED_ACTIONS: 精準射擊, 視覺捕捉`);
            }

            state.isInitialized = true;
            await ModuleLoader.loadAll();
            renderCurrentView();
        }
    };

    // --- Outline Assembler ---
    const OutlineAssembler = {
        generate() {
            const d = state.outlineData;
            let outline = `[CHAPTER_${d.chapter}_${d.version}]\n### 本章核心事件\n${d.coreEvent}\n\n`;
            const tabNames = ["起", "承", "轉", "合"];
            
            for (let i = 0; i < 4; i++) {
                const tab = d.tabs[i];
                outline += `【${tabNames[i]}】\n`;
                if (tab.scene) outline += `- 全局場景：${tab.scene}\n`;
                outline += "- 出場人物:\n";
                let hasChars = false;
                for (const charCode in tab.characters) {
                    const charData = tab.characters[charCode];
                    if (charData.checked) {
                        hasChars = true;
                        outline += `  - [${charCode}]:\n`;
                        const labelMap = { Actions: "行為", Speech: "口吻", Clothing: "服裝", Items: "道具", Physical: "身體狀態", Mental: "精神狀態" };
                        for (const key in charData.settings) {
                            const s = charData.settings[key];
                            if (s.name) outline += `    - ${labelMap[key]}: ${s.name}\n`;
                            if (s.must) outline += `    - [MUST_EXECUTE (${labelMap[key]})]: ${s.must}\n`;
                            if (s.forbid) outline += `    - [FORBIDDEN_EXECUTE (${labelMap[key]})]: ${s.forbid}\n`;
                        }
                    }
                }
                if (!hasChars) outline += "  - (無)\n";
                if (tab.actionText) outline += `- 全局動作描述：${tab.actionText}\n`;
                outline += "\n";
            }
            outline += `[SYSTEM_INSTRUCTION]: 請根據上述大綱與模組，生成正文，並在文末嚴格按照 <sd_prompt> 格式輸出帶權重的視覺提示詞。`;
            return outline;
        }
    };

    // --- UI Renderers ---
    function renderCurrentView() {
        const container = document.getElementById('view-container');
        container.innerHTML = '';
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.toggle('active-nav-item', btn.dataset.view === state.currentView);
            btn.classList.toggle('text-on-surface-variant', btn.dataset.view !== state.currentView);
        });

        switch (state.currentView) {
            case 'system': renderSystemView(container); break;
            case 'modules': renderModulesView(container); break;
            case 'outline': renderOutlineView(container); break;
            case 'triggers': renderTriggersView(container); break;
        }
    }

    function renderSystemView(container) {
        container.innerHTML = `
            <div class="p-gutter space-y-4">
                <h2 class="font-label-caps text-sm text-primary-fixed-dim border-l-2 border-primary-container pl-2">環境狀態與初始化</h2>
                <div class="glass-panel p-4 rounded-sm space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="font-data-md text-sm">Root Workspace:</span>
                        <span class="font-data-md text-sm ${state.driveIds.root ? 'text-green-400' : 'text-error'}">${state.driveIds.root || 'NOT FOUND'}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="font-data-md text-sm">Central Core:</span>
                        <span class="font-data-md text-sm ${state.driveIds.core ? 'text-green-400' : 'text-error'}">${state.driveIds.core || 'NOT FOUND'}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="font-data-md text-sm">Modules Loaded:</span>
                        <span class="font-data-md text-sm text-primary-fixed-dim">${Object.values(state.moduleData).reduce((a, b) => a + b.length, 0)}</span>
                    </div>
                </div>
                <button id="init-btn" class="w-full bg-primary-container text-on-primary-fixed py-3 rounded-sm font-label-caps text-sm flex items-center justify-center gap-2 active:opacity-80 transition-all cyan-glow">
                    <span class="material-symbols-outlined">rocket_launch</span> 一鍵初始化天道流環境 (Google Drive)
                </button>
                <button id="reload-btn" class="w-full bg-surface-container-high text-on-surface py-3 rounded-sm font-label-caps text-sm border border-outline-variant">
                    🔄 重新載入模組庫
                </button>
            </div>
        `;
        document.getElementById('init-btn').onclick = async () => {
            document.getElementById('mask-status').innerText = 'INITIALIZING...';
            document.getElementById('secure-mask').classList.remove('hidden-mask');
            await EnvSetup.initialize();
            document.getElementById('secure-mask').classList.add('hidden-mask');
        };
        document.getElementById('reload-btn').onclick = async () => {
            await ModuleLoader.loadAll();
            renderCurrentView();
        };
    }

    function renderModulesView(container) {
        if (!state.isInitialized) {
            container.innerHTML = `<div class="p-gutter text-center text-on-surface-variant">請先在 System 頁面初始化環境。</div>`;
            return;
        }
        let html = `<div class="p-gutter space-y-4">`;
        for (const cat of MOD_CATEGORIES) {
            const mods = state.moduleData[cat.key] || [];
            html += `
                <div class="space-y-2">
                    <h3 class="font-label-caps text-[10px] text-on-surface-variant border-l-2 border-primary-container pl-2">${cat.label} (${mods.length})</h3>
                    <div class="grid grid-cols-1 gap-2">
                        ${mods.length === 0 ? '<div class="text-xs text-on-surface-variant glass-panel p-2 rounded">無模組</div>' : 
                        mods.map(m => `
                            <div class="glass-panel p-3 rounded-sm flex justify-between items-center cursor-pointer hover:bg-surface-container-highest transition-colors module-item" data-id="${m.code}" data-cat="${cat.key}">
                                <div>
                                    <div class="font-data-md text-sm text-on-surface">${m.name}</div>
                                    <div class="font-label-caps text-[8px] text-outline uppercase">${m.code}</div>
                                </div>
                                <span class="material-symbols-outlined text-outline text-[18px]">edit</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        html += `</div>`;
        container.innerHTML = html;

        container.querySelectorAll('.module-item').forEach(el => {
            el.onclick = () => openModuleEditor(el.dataset.id, el.dataset.cat);
        });
    }

    function openModuleEditor(code, catKey) {
        const mod = state.moduleData[catKey].find(m => m.code === code);
        if (!mod) return;
        
        const modal = document.getElementById('modal-container');
        modal.classList.remove('hidden');
        modal.innerHTML = `
            <div class="modal-overlay">
                <div class="bg-surface border border-outline-variant rounded-sm w-full max-w-2xl h-[80vh] flex flex-col">
                    <div class="p-4 border-b border-outline-variant flex justify-between items-center">
                        <div>
                            <div class="font-label-caps text-xs text-primary-fixed-dim">編輯模組: ${mod.code}</div>
                            <div class="font-data-md text-[10px] text-on-surface-variant">File ID: ${mod.fileId}</div>
                        </div>
                        <button id="close-modal" class="text-on-surface-variant"><span class="material-symbols-outlined">close</span></button>
                    </div>
                    <textarea id="editor-content" class="flex-1 p-4 bg-black/20 text-on-surface font-data-md text-sm resize-none focus:ring-0 border-none">${mod.rawContent}</textarea>
                    <div class="p-4 border-t border-outline-variant flex gap-2">
                        <button id="save-overwrite" class="flex-1 bg-primary-container text-on-primary-fixed py-2 rounded-sm font-label-caps text-xs">💾 覆寫原模組</button>
                        <button id="save-as" class="flex-1 bg-surface-container-high text-on-surface py-2 rounded-sm font-label-caps text-xs border border-outline-variant">📄 另存新模組</button>
                    </div>
                </div>
            </div>
        `;

        document.getElementById('close-modal').onclick = () => modal.classList.add('hidden');
        document.getElementById('save-overwrite').onclick = async () => {
            const content = document.getElementById('editor-content').value;
            await DriveAPI.updateFile(mod.fileId, content);
            mod.rawContent = content;
            modal.classList.add('hidden');
            alert('模組已覆寫！');
        };
        document.getElementById('save-as').onclick = async () => {
            const newName = prompt('請輸入新模組名稱 (不含 .txt):');
            if (!newName) return;
            const content = document.getElementById('editor-content').value;
            const catPath = MOD_CATEGORIES.find(c => c.key === catKey).path;
            const catId = await DriveAPI.findId(catPath, state.driveIds.core, true);
            await DriveAPI.createFile(`${newName}.txt`, catId, content);
            await ModuleLoader.loadAll();
            modal.classList.add('hidden');
            renderCurrentView();
            alert('新模組已儲存！');
        };
    }

    function renderOutlineView(container) {
        if (!state.isInitialized) {
            container.innerHTML = `<div class="p-gutter text-center text-on-surface-variant">請先在 System 頁面初始化環境。</div>`;
            return;
        }
        const d = state.outlineData;
        const tabNames = ["起", "承", "轉", "合"];
        
        let html = `
            <div class="p-gutter space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <div class="space-y-1">
                        <label class="font-label-caps text-[10px] text-on-surface-variant">章節編號</label>
                        <input type="text" id="chap-num" value="${d.chapter}" class="w-full bg-surface-container-high border border-outline text-on-surface px-2 py-1.5 rounded-sm font-data-md text-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="font-label-caps text-[10px] text-on-surface-variant">版次</label>
                        <input type="text" id="chap-ver" value="${d.version}" class="w-full bg-surface-container-high border border-outline text-on-surface px-2 py-1.5 rounded-sm font-data-md text-sm">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="font-label-caps text-[10px] text-on-surface-variant">本章核心事件</label>
                    <textarea id="core-event" class="w-full bg-surface-container-high border border-outline text-on-surface px-2 py-1.5 rounded-sm font-data-md text-sm min-h-[60px]">${d.coreEvent}</textarea>
                </div>

                <div class="flex border-b border-outline-variant">
                    ${tabNames.map((name, i) => `
                        <button class="tab-btn flex-1 py-2 font-label-caps text-xs ${state.currentTab === i ? 'tab-active' : 'text-on-surface-variant'}" data-tab="${i}">【${name}】</button>
                    `).join('')}
                </div>

                <div id="tab-content" class="space-y-4"></div>
            </div>
        `;
        container.innerHTML = html;

        document.getElementById('chap-num').oninput = (e) => d.chapter = e.target.value;
        document.getElementById('chap-ver').oninput = (e) => d.version = e.target.value;
        document.getElementById('core-event').oninput = (e) => d.coreEvent = e.target.value;

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                state.currentTab = parseInt(btn.dataset.tab);
                renderOutlineView(container);
            };
        });

        renderTabContent();
    }

    function renderTabContent() {
        const tabContent = document.getElementById('tab-content');
        const tabData = state.outlineData.tabs[state.currentTab];
        const scenes = state.moduleData['Scenes'] || [];
        const chars = state.moduleData['Chars'] || [];
        const modTypes = [
            { key: 'Actions', label: '行為/動作' }, { key: 'Speech', label: '口吻/常用語' },
            { key: 'Clothing', label: '服裝' }, { key: 'Items', label: '道具' },
            { key: 'Physical', label: '身體狀態' }, { key: 'Mental', label: '精神狀態' }
        ];

        let html = `
            <div class="space-y-1">
                <label class="font-label-caps text-[10px] text-on-surface-variant">全局場景</label>
                <select id="scene-select" class="w-full bg-surface-container-high border border-outline text-on-surface px-2 py-2 rounded-sm font-data-md text-sm">
                    <option value="">(無)</option>
                    ${scenes.map(s => `<option value="${s.code}" ${tabData.scene === s.code ? 'selected' : ''}>${s.name}</option>`).join('')}
                </select>
            </div>
            <div class="space-y-1">
                <label class="font-label-caps text-[10px] text-on-surface-variant">動作/劇情描述</label>
                <textarea id="action-text" class="w-full bg-surface-container-high border border-outline text-on-surface px-2 py-1.5 rounded-sm font-data-md text-sm min-h-[80px]">${tabData.actionText}</textarea>
            </div>
            <div class="space-y-2">
                <label class="font-label-caps text-[10px] text-on-surface-variant">出場人物</label>
                ${chars.map(c => `
                    <div class="glass-panel p-2 rounded-sm space-y-2">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="char-check rounded text-primary-container" data-code="${c.code}" ${tabData.characters[c.code]?.checked ? 'checked' : ''}>
                            <span class="font-data-md text-sm">${c.name}</span>
                        </label>
                        <div class="char-settings ${tabData.characters[c.code]?.checked ? '' : 'hidden'} space-y-2 pl-6 border-l border-outline-variant">
                            ${modTypes.map(mt => {
                                const mods = state.moduleData[mt.key] || [];
                                const charSetting = tabData.characters[c.code]?.settings?.[mt.key] || {};
                                return `
                                    <div class="grid grid-cols-3 gap-1 items-center">
                                        <span class="font-label-caps text-[8px] text-on-surface-variant">${mt.label}</span>
                                        <select class="mod-select col-span-2 bg-surface-container-high border border-outline text-on-surface px-1 py-1 rounded-sm font-data-md text-[10px]" data-char="${c.code}" data-type="${mt.key}">
                                            <option value="">(無)</option>
                                            ${mods.map(m => `<option value="${m.code}" ${charSetting.name === m.code ? 'selected' : ''}>${m.name}</option>`).join('')}
                                        </select>
                                    </div>
                                    <div class="grid grid-cols-2 gap-1">
                                        <input type="text" placeholder="Must Execute" class="must-input bg-surface-container-high border border-outline text-on-surface px-1 py-1 rounded-sm font-data-md text-[10px]" data-char="${c.code}" data-type="${mt.key}" value="${charSetting.must || ''}">
                                        <input type="text" placeholder="Forbid" class="forbid-input bg-surface-container-high border border-outline text-on-surface px-1 py-1 rounded-sm font-data-md text-[10px]" data-char="${c.code}" data-type="${mt.key}" value="${charSetting.forbid || ''}">
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `).join('')}
            </div>
            <div class="pt-2 border-t border-outline-variant">
                <label class="font-label-caps text-[10px] text-on-surface-variant">段落設定繼承</label>
                <div class="flex gap-2 mt-1">
                    <select id="inherit-src" class="flex-1 bg-surface-container-high border border-outline text-on-surface px-2 py-1.5 rounded-sm font-data-md text-xs">
                        ${["起", "承", "轉", "合"].map((name, i) => i !== state.currentTab ? `<option value="${i}">從【${name}】帶入</option>` : '').join('')}
                    </select>
                    <button id="inherit-btn" class="bg-surface-container-high text-on-surface px-3 py-1.5 rounded-sm font-label-caps text-xs border border-outline-variant">📥 帶入</button>
                </div>
            </div>
        `;
        tabContent.innerHTML = html;

        document.getElementById('scene-select').onchange = (e) => tabData.scene = e.target.value;
        document.getElementById('action-text').oninput = (e) => tabData.actionText = e.target.value;

        tabContent.querySelectorAll('.char-check').forEach(cb => {
            cb.onchange = (e) => {
                const code = e.target.dataset.code;
                if (!tabData.characters[code]) tabData.characters[code] = { checked: false, settings: {} };
                tabData.characters[code].checked = e.target.checked;
                renderTabContent();
            };
        });

        tabContent.querySelectorAll('.mod-select').forEach(sel => {
            sel.onchange = (e) => {
                const charCode = e.target.dataset.char;
                const type = e.target.dataset.type;
                if (!tabData.characters[charCode].settings[type]) tabData.characters[charCode].settings[type] = {};
                tabData.characters[charCode].settings[type].name = e.target.value;
            };
        });

        tabContent.querySelectorAll('.must-input').forEach(inp => {
            inp.oninput = (e) => {
                const charCode = e.target.dataset.char;
                const type = e.target.dataset.type;
                if (!tabData.characters[charCode].settings[type]) tabData.characters[charCode].settings[type] = {};
                tabData.characters[charCode].settings[type].must = e.target.value;
            };
        });

        tabContent.querySelectorAll('.forbid-input').forEach(inp => {
            inp.oninput = (e) => {
                const charCode = e.target.dataset.char;
                const type = e.target.dataset.type;
                if (!tabData.characters[charCode].settings[type]) tabData.characters[charCode].settings[type] = {};
                tabData.characters[charCode].settings[type].forbid = e.target.value;
            };
        });

        document.getElementById('inherit-btn').onclick = () => {
            const srcIdx = parseInt(document.getElementById('inherit-src').value);
            const srcTab = state.outlineData.tabs[srcIdx];
            tabData.scene = srcTab.scene;
            tabData.actionText = srcTab.actionText;
            tabData.characters = JSON.parse(JSON.stringify(srcTab.characters));
            renderTabContent();
        };
    }

    function renderTriggersView(container) {
        const prompts = {
            "AUDIT": "【自我審計協議】\n請執行自我審計，檢查上述生成內容是否違反當前生效模組。若有違規，請自行修正並輸出最終版。",
            "REVIEW": "【角色內心復盤】\n請啟動角色內心復盤，推演本章互動對角色隱性關係的影響，並輸出結構化的 [FACT_LOG_UPDATE]。",
            "DIRECTOR": "【導演視角反思】\n請先進行導演視角反思，思考如何用鏡頭語言還原文字張力，再生成 <sd_prompt>。",
            "TOT": "【思維樹推演】\n請推演 3 種劇情走向，自我評估並淘汰不符合當前模組狀態的路線，選擇最合理的一條生成。"
        };

        container.innerHTML = `
            <div class="p-gutter space-y-4">
                <h2 class="font-label-caps text-sm text-primary-fixed-dim border-l-2 border-primary-container pl-2">強模型自我思維觸發器</h2>
                <div class="grid grid-cols-2 gap-2">
                    ${Object.keys(prompts).map(key => `
                        <button class="trigger-btn bg-surface-container-high text-on-surface p-3 rounded-sm font-label-caps text-[10px] border border-outline-variant flex flex-col items-center gap-1 active:bg-surface-bright" data-prompt="${key}">
                            <span class="material-symbols-outlined text-primary-fixed-dim">psychology</span>
                            ${key}
                        </button>
                    `).join('')}
                </div>

                <h2 class="font-label-caps text-sm text-primary-fixed-dim border-l-2 border-primary-container pl-2 mt-6">大綱預覽與導出</h2>
                <div class="glass-panel p-3 rounded-sm">
                    <pre id="outline-preview" class="font-data-md text-[10px] text-on-surface-variant whitespace-pre-wrap max-h-[300px] overflow-y-auto"></pre>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button id="refresh-preview" class="bg-surface-container-high text-on-surface py-2 rounded-sm font-label-caps text-xs border border-outline-variant">👁️ 更新預覽</button>
                    <button id="copy-outline" class="bg-primary-container text-on-primary-fixed py-2 rounded-sm font-label-caps text-xs flex items-center justify-center gap-1 cyan-glow">
                        <span class="material-symbols-outlined text-[16px]">content_copy</span> 複製全部大綱
                    </button>
                </div>
            </div>
        `;

        document.querySelectorAll('.trigger-btn').forEach(btn => {
            btn.onclick = () => {
                navigator.clipboard.writeText(prompts[btn.dataset.prompt]);
                alert(`已複製 ${btn.dataset.prompt} 觸發器指令！`);
            };
        });

        document.getElementById('refresh-preview').onclick = () => {
            document.getElementById('outline-preview').innerText = OutlineAssembler.generate();
        };

        document.getElementById('copy-outline').onclick = () => {
            navigator.clipboard.writeText(OutlineAssembler.generate());
            alert('大綱已複製到剪貼簿！');
        };
        
        document.getElementById('outline-preview').innerText = OutlineAssembler.generate();
    }

    // --- Event Listeners & Init ---
    document.getElementById('auth-btn').addEventListener('click', () => {
        if (!state.tokenClient) return;
        state.tokenClient.callback = async (resp) => {
            if (resp.error) throw resp;
            document.getElementById('auth-btn-text').innerText = 'AGENT_AUTH';
            document.getElementById('auth-btn').classList.replace('bg-primary-container', 'bg-surface-container-highest');
            
            document.getElementById('mask-status').innerText = 'LOCATING_WORKSPACE...';
            state.driveIds.root = await DriveAPI.findId(TDF_CONFIG.WORKSPACE_ROOT, null, true);
            if (state.driveIds.root) {
                state.driveIds.core = await DriveAPI.findId(TDF_CONFIG.CORE_PATH, state.driveIds.root, true);
                if (state.driveIds.core) {
                    state.isInitialized = true;
                    document.getElementById('mask-status').innerText = 'LOADING_MODULES...';
                    await ModuleLoader.loadAll();
                }
            }
            
            document.getElementById('secure-mask').classList.add('hidden-mask');
            document.getElementById('main-app-content').classList.add('unlocked');
            renderCurrentView();
        };

        if (gapi.client.getToken() === null) {
            state.tokenClient.requestAccessToken({ prompt: 'consent' });
        } else {
            state.tokenClient.requestAccessToken({ prompt: '' });
        }
    });

    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.onclick = () => {
            state.currentView = btn.dataset.view;
            renderCurrentView();
        };
    });

    window.onload = () => { gapiLoaded(); gisLoaded(); };
</script>
</body>
</html>
