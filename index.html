<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天道流稽核引擎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'surface-container-highest': '#e6e2de',
                        'text-on-surface-variant': '#494541',
                        'primary-container': '#004b6e',
                        'text-on-primary-fixed': '#ffffff'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 border border-gray-200">
        <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center">天道流稽核系統V1</h1>
        <p class="text-sm text-gray-500 mb-6 text-center">核心自動化運維控制台</p>
        
        <button id="auth-btn" disabled class="w-full py-4 px-6 rounded-xl font-semibold flex items-center justify-center gap-3 transition-all duration-300 cursor-not-allowed bg-surface-container-highest text-on-surface-variant">
            <svg id="loading-spinner" class="animate-spin h-5 w-5 text-current" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span id="auth-btn-text">載入系統中...</span>
        </button>
    </div>

    <script async defer src="https://apis.google.com/js/api.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client"></script>

    <script>
        // 1. 系統全域配置
        const TDF_CONFIG = {
            CLIENT_ID: '113481234677-vhtkocf6nsp7pm47figsdgm6vsdqlrea.apps.googleusercontent.com', // 請替換成您的 Google Client ID
            DISCOVERY_DOCS: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
            SCOPES: 'https://www.googleapis.com/auth/drive.readonly'
        };

        // 2. 核心狀態機
        const state = {
            gapiInited: false,
            driveLoaded: false,
            gisInited: false,
            tokenClient: null
        };

        // ==========================================
        // 🌟 核心修正：揚棄輪詢，改用正統雙軌防禦性事件驅動
        // ==========================================
        let isCoreInitialized = false; // 防止重複初始化鎖

        // 管線 A：當網頁 DOM 結構就緒時觸發
        window.addEventListener('DOMContentLoaded', () => {
            console.log("⚡ DOM 結構就緒，啟動天道流載入程序...");
            checkAndTriggerInit();
        });

        // 管線 B：保底保險機制（防止部分行動端或隱私瀏覽器 async 載入時序錯亂）
        window.onload = () => {
            console.log("⚡ Window 資源完全加載，執行保底對齊檢查...");
            checkAndTriggerInit();
        };

        // 檢查指令碼狀態並觸發初始化
        function checkAndTriggerInit() {
            if (isCoreInitialized) return;

            const gapiReady = typeof gapi !== 'undefined';
            const googleReady = typeof google !== 'undefined';

            console.log(`📡 元件狀態校對 -> GAPI 腳本: ${gapiReady ? 'OK' : '未到位'}, GIS 腳本: ${googleReady ? 'OK' : '未到位'}`);

            // 當兩大 Google 核心腳本皆成功掛載於 window，立刻解鎖初始化
            if (gapiReady && googleReady) {
                isCoreInitialized = true;
                initializeSystem();
            } else {
                // 🌟 超時保底防護：若過了載入點腳本依然失聯（如被 AdBlock 攔截），3 秒內強行噴出具體錯誤，拒絕靜默卡死！
                setTimeout(() => {
                    if (!isCoreInitialized) {
                        const missing = !gapiReady ? "GAPI 腳本被阻斷" : "GIS 驗證組件被阻斷";
                        reportInitError(missing);
                    }
                }, 3000);
            }
        }

        // 3. 系統初始化核心
        async function initializeSystem() {
            console.log("開始初始化天道流核心...");
            try {
                // 處理 GAPI (Google API Client) 初始化
                if (typeof gapi !== 'undefined') {
                    gapi.load('client', async () => {
                        try {
                            await gapi.client.init({ discoveryDocs: TDF_CONFIG.DISCOVERY_DOCS });
                            state.gapiInited = true;
                            
                            if (gapi.client.drive) {
                                state.driveLoaded = true;
                                console.log("GAPI Drive 核心組件掛載成功。");
                            } else {
                                await gapi.client.load('drive', 'v3');
                                state.driveLoaded = true;
                            }
                            enableAuthButtonIfReady();
                        } catch (initErr) {
                            console.error("GAPI 內部初始化失敗:", initErr);
                            reportInitError("GAPI 初始化失敗");
                        }
                    });
                } else {
                    reportInitError("GAPI 斷線");
                }

                // 處理 GIS (Google Identity Services) 初始化
                if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
                    state.tokenClient = google.accounts.oauth2.initTokenClient({
                        client_id: TDF_CONFIG.CLIENT_ID,
                        scope: TDF_CONFIG.SCOPES,
                        prompt: '', 
                        callback: (resp) => handleAuthCallback(resp)
                    });
                    state.gisInited = true;
                    enableAuthButtonIfReady();
                } else {
                    reportInitError("GIS 斷線");
                }
            } catch (err) {
                console.error('天道系統核心初始化出錯：', err);
                reportInitError("核心崩潰");
            }
        }

        // 4. 狀態檢查哨：解鎖登入按鈕
        function enableAuthButtonIfReady() {
            console.log(`狀態校對 -> GAPI: ${state.gapiInited}, Drive: ${state.driveLoaded}, GIS: ${state.gisInited}`);
            
            if (state.gapiInited && state.driveLoaded && state.gisInited) {
                const authBtn = document.getElementById('auth-btn');
                const authBtnText = document.getElementById('auth-btn-text');
                const spinner = document.getElementById('loading-spinner');
                
                // 解鎖按鈕與變更樣式
                authBtn.disabled = false;
                authBtn.classList.remove('cursor-not-allowed', 'bg-surface-container-highest', 'text-on-surface-variant');
                authBtn.classList.add('cursor-pointer', 'bg-primary-container', 'text-on-primary-fixed', 'hover:opacity-90');
                
                // 隱藏 Spinner 並更換文字
                if (spinner) spinner.style.display = 'none';
                authBtnText.innerText = '登入天道流稽核系統';

                // 綁定點擊事件
                authBtn.onclick = () => {
                    if (state.tokenClient) {
                        state.tokenClient.requestAccessToken();
                    }
                };

                // 執行自動登入嘗試 (可選)
                tryAutoLogin();
            }
        }

        // 5. 異常狀況回報器
        function reportInitError(reason) {
            const authBtnText = document.getElementById('auth-btn-text');
            const authBtn = document.getElementById('auth-btn');
            const spinner = document.getElementById('loading-spinner');
            
            if (spinner) spinner.style.display = 'none';
            if (authBtnText) {
                authBtnText.innerText = `載入失敗 (${reason})`;
            }
            if (authBtn) {
                authBtn.classList.replace('bg-surface-container-highest', 'bg-red-200');
                authBtn.classList.replace('text-on-surface-variant', 'text-red-800');
            }
        }

        // 6. 授權回呼與自動登入保底
        function handleAuthCallback(response) {
            if (response.error !== undefined) {
                console.error("授權失敗:", response);
                alert("身份驗證失敗，請重新嘗試。");
                return;
            }
            console.log("授權成功！Token 已取回。", response);
            // 這裡可以導向你的主稽核功能，例如：runAuditEngine();
        }

        function tryAutoLogin() {
            console.log("嘗試執行背景自動登入對齊...");
            // 自動登入邏輯（如讀取 localStorage token 驗證等）
        }
    </script>
</body>
</html>
