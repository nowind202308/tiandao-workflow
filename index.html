<!DOCTYPE html>
<html lang="zh-TW">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self'; 
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://apis.google.com https://accounts.google.com; 
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
        font-src 'self' https://fonts.gstatic.com;
        frame-src https://accounts.google.com https://content.googleapis.com; 
        connect-src 'self' https://content.googleapis.com https://accounts.google.com https://*.googleapis.com;
    ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天道流稽核引擎</title>
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self'; 
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://apis.google.com https://accounts.google.com; 
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
        font-src 'self' https://fonts.gstatic.com;
        frame-src https://accounts.google.com; 
        connect-src 'self' https://content.googleapis.com https://accounts.google.com;
    ">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4 font-sans">

    <div id="login-view" class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8 border border-gray-200 block">
        <h1 class="text-3xl font-extrabold text-gray-900 mb-2 text-center tracking-tight">天道流稽核系統</h1>
        <p class="text-sm text-gray-500 mb-8 text-center">核心自動化運維控制台 V1.0.002</p>
        
        <button id="auth-btn" disabled class="w-full py-4 px-6 rounded-xl font-bold flex items-center justify-center gap-3 transition-all duration-300 cursor-not-allowed bg-gray-200 text-gray-500">
            <svg id="loading-spinner" class="animate-spin h-5 w-5 text-current" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span id="auth-btn-text">系統核心初始化中...</span>
        </button>
    </div>

    <div id="main-view" class="hidden w-full max-w-4xl bg-white rounded-2xl shadow-2xl p-8 border border-gray-200">
        <div class="flex justify-between items-center border-b pb-4 mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">天道流稽核控制台</h1>
                <p class="text-sm text-green-600 flex items-center gap-1 mt-1">
                    <span class="h-2 w-2 rounded-full bg-green-500 inline-block animate-pulse"></span>
                    Google Drive API 核心連線成功
                </p>
            </div>
            <button onclick="logoutSystem()" class="text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 py-2 px-4 rounded-lg transition font-medium">
                登出系統
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="p-5 bg-blue-50 border border-blue-100 rounded-xl">
                <h3 class="font-bold text-blue-900 mb-1">檔案掃描排程</h3>
                <p class="text-xs text-blue-700 leading-relaxed">自動對齊雲端硬碟變更日誌</p>
            </div>
            <div class="p-5 bg-purple-50 border border-purple-100 rounded-xl">
                <h3 class="font-bold text-purple-900 mb-1">權限異常審查</h3>
                <p class="text-xs text-purple-700 leading-relaxed">即時監控外部公開分享鏈結</p>
            </div>
            <div class="p-5 bg-amber-50 border border-amber-100 rounded-xl">
                <h3 class="font-bold text-amber-900 mb-1">天道流自動化管線</h3>
                <p class="text-xs text-amber-700 leading-relaxed">MIS 系統日誌同步對齊</p>
            </div>
        </div>

        <div class="bg-gray-900 text-green-400 p-5 rounded-xl font-mono text-sm h-72 overflow-y-auto shadow-inner border border-gray-800">
            <div class="text-gray-500">> [SYSTEM] 天道流自動化稽核管線就緒。</div>
            <div class="text-gray-500">> [SYSTEM] 等待調度指令...</div>
            <div id="console-output"></div>
        </div>
    </div>

    <script async defer src="https://apis.google.com/js/api.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client"></script>

    <script>
        // 1. 系統全域配置
        const TDF_CONFIG = {
            // 🌟 這裡記得填入您修正後的正確 Client ID 喔！
            CLIENT_ID: '113481234677-vhtkocf6nsp7pm47figsdgm6vsdqlrea.apps.googleusercontent.com', 
            DISCOVERY_DOCS: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
            SCOPES: 'https://www.googleapis.com/auth/drive.readonly'
        };

        const state = {
            gapiInited: false,
            driveLoaded: false,
            gisInited: false,
            tokenClient: null
        };

        let isCoreInitialized = false;

        // 雙軌防禦載入檢查
        window.addEventListener('DOMContentLoaded', () => {
            checkAndTriggerInit();
        });

        window.onload = () => {
            checkAndTriggerInit();
        };

        function checkAndTriggerInit() {
            if (isCoreInitialized) return;
            const gapiReady = typeof gapi !== 'undefined';
            const googleReady = typeof google !== 'undefined';

            console.log(`📡 元件狀態校對 -> GAPI 腳本: ${gapiReady ? 'OK' : '未到位'}, GIS 腳本: ${googleReady ? 'OK' : '未到位'}`);

            if (gapiReady && googleReady) {
                isCoreInitialized = true;
                initializeSystem();
            } else {
                setTimeout(() => {
                    if (!isCoreInitialized) {
                        const missing = !gapiReady ? "GAPI 腳本被阻斷" : "GIS 驗證組件被阻斷";
                        reportInitError(missing);
                    }
                }, 3000);
            }
        }

        async function initializeSystem() {
            console.log("開始初始化天道流核心...");
            try {
                if (typeof gapi !== 'undefined') {
                    gapi.load('client', async () => {
                        try {
                            await gapi.client.init({ discoveryDocs: TDF_CONFIG.DISCOVERY_DOCS });
                            state.gapiInited = true;
                            state.driveLoaded = !!gapi.client.drive;
                            enableAuthButtonIfReady();
                        } catch (initErr) {
                            console.error("GAPI 初始化失敗:", initErr);
                            reportInitError("GAPI 初始化失敗");
                        }
                    });
                }

                if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
                    state.tokenClient = google.accounts.oauth2.initTokenClient({
                        client_id: TDF_CONFIG.CLIENT_ID,
                        scope: TDF_CONFIG.SCOPES,
                        prompt: '', 
                        callback: (resp) => handleAuthCallback(resp)
                    });
                    state.gisInited = true;
                    enableAuthButtonIfReady();
                }
            } catch (err) {
                console.error("系統初始化崩潰:", err);
                reportInitError("核心崩潰");
            }
        }

        function enableAuthButtonIfReady() {
            console.log(`按鈕解鎖檢查哨 -> GAPI: ${state.gapiInited}, Drive: ${state.driveLoaded}, GIS: ${state.gisInited}`);
            
            if (state.gapiInited && state.driveLoaded && state.gisInited) {
                const authBtn = document.getElementById('auth-btn');
                const authBtnText = document.getElementById('auth-btn-text');
                const spinner = document.getElementById('loading-spinner');
                
                if (authBtn) {
                    authBtn.disabled = false;
                    // 還原並切換為標準 Tailwind 藍色樣式，確保 100% 渲染成功
                    authBtn.className = "w-full py-4 px-6 rounded-xl font-bold flex items-center justify-center gap-3 transition-all duration-300 cursor-pointer bg-blue-600 hover:bg-blue-700 text-white shadow-lg shadow-blue-200";
                    
                    if (spinner) spinner.style.display = 'none';
                    if (authBtnText) authBtnText.innerText = '登入天道流稽核系統';

                    authBtn.onclick = () => {
                        if (state.tokenClient) {
                            state.tokenClient.requestAccessToken();
                        }
                    };
                }
            }
        }

        function reportInitError(reason) {
            const authBtnText = document.getElementById('auth-btn-text');
            const authBtn = document.getElementById('auth-btn');
            const spinner = document.getElementById('loading-spinner');
            
            if (spinner) spinner.style.display = 'none';
            if (authBtnText) authBtnText.innerText = `載入失敗 (${reason})`;
            if (authBtn) {
                authBtn.className = "w-full py-4 px-6 rounded-xl font-bold flex items-center justify-center gap-3 bg-red-100 text-red-700 border border-red-200";
            }
        }

        function handleAuthCallback(response) {
            if (response.error !== undefined) {
                console.error("授權失敗:", response);
                alert("身份驗證失敗，請重新嘗試。");
                return;
            }
            
            console.log("授權成功！Token 已取回。", response);

            // 隱藏登入，展開主功能面板
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');

            printLog("成功取得 Google OAuth 安全認證標記 (AccessToken)。");
            printLog("天道流雲端硬碟自動化稽核管線開始對齊...");
        }

        function printLog(message) {
            const consoleBox = document.getElementById('console-output');
            const time = new Date().toLocaleTimeString();
            if (consoleBox) {
                consoleBox.innerHTML += `<div class="mt-2"><span class="text-blue-400">[${time}]</span> > ${message}</div>`;
                consoleBox.scrollTop = consoleBox.scrollHeight;
            }
        }

        function logoutSystem() {
            if (gapi.client) {
                gapi.client.setToken(null);
            }
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('login-view').classList.remove('hidden');
        }
    </script>
</body>
</html>
