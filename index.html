<!DOCTYPE html>
<html class="dark" lang="zh-TW">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Project Controller</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script async defer src="https://accounts.google.com/gsi/client"></script>

    <style>
        .glass-panel { background: rgba(21, 29, 30, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(132, 148, 149, 0.1); }
        .scanline { width: 100%; height: 2px; background: rgba(0, 219, 231, 0.05); position: absolute; top: 0; animation: scan 8s linear infinite; z-index: 10; pointer-events: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .cyan-glow { box-shadow: 0 0 15px rgba(0, 219, 231, 0.15); }
        .active-nav-item { color: #00f2ff; border-top: 2px solid #00f2ff; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #080f10; }
        ::-webkit-scrollbar-thumb { background: #3a494b; border-radius: 2px; }
        
        #main-app-content { opacity: 0; pointer-events: none; transition: opacity 0.5s ease, margin-bottom 0.3s ease; }
        #main-app-content.unlocked { opacity: 1; pointer-events: auto; }
        .secure-mask { position: fixed; inset: 0; background: #080f10; z-index: 40; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #00dbe7; font-family: 'JetBrains Mono', monospace; font-size: 12px; transition: opacity 0.5s ease; gap: 10px; }
        .secure-mask.hidden-mask { opacity: 0; pointer-events: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .tab-active { border-bottom: 2px solid #00f2ff; color: #00f2ff; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }

        #main-nav { transform: translateY(0); transition: transform 0.3s ease-in-out; }
        #main-nav.nav-hidden { transform: translateY(100%); }
        #nav-expanded { opacity: 1; transition: opacity 0.3s ease; }
        #nav-collapsed { opacity: 0; transform: scale(0.5); transition: opacity 0.3s ease, transform 0.3s ease; }
        #nav-collapsed.show { opacity: 1; transform: scale(1); }
        
        /* 標籤雲樣式 */
        .tag-cloud-btn { transition: all 0.2s ease; }
        .tag-cloud-btn:hover { transform: translateY(-2px); }
        .tag-cloud-btn.active { background: #00f2ff; color: #002022; }
    </style>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: {
                "on-primary-fixed": "#002022", "surface-container-low": "#151d1e", "inverse-on-surface": "#2a3232",
                "on-primary-container": "#006a71", "surface-tint": "#00dbe7", "secondary-fixed": "#e5e2e1",
                "primary-fixed": "#74f5ff", "surface-container-lowest": "#080f10", "on-secondary-container": "#bab8b7",
                "surface": "#0d1515", "error-container": "#93000a", "surface-container-highest": "#2e3637",
                "surface-dim": "#0d1515", "inverse-primary": "#00696f", "on-secondary": "#313030",
                "primary-fixed-dim": "#00dbe7", "on-tertiary-fixed": "#291800", "on-surface-variant": "#b9cacb",
                "on-tertiary": "#452b00", "tertiary-container": "#ffd49d", "on-surface": "#dce4e4",
                "on-error-container": "#ffdad6", "tertiary": "#fff6ef", "surface-container": "#192122",
                "background": "#0d1515", "on-primary": "#00363a", "on-primary-fixed-variant": "#004f54",
                "on-error": "#690005", "error": "#ffb4ab", "on-secondary-fixed": "#1c1b1b",
                "on-tertiary-container": "#845600", "surface-container-high": "#232b2c", "secondary": "#c9c6c5",
                "on-tertiary-fixed-variant": "#633f00", "secondary-container": "#4a4949", "primary": "#e1fdff",
                "tertiary-fixed": "#ffddb4", "on-secondary-fixed-variant": "#474646", "tertiary-fixed-dim": "#ffb952",
                "on-background": "#dce4e4", "surface-bright": "#333b3b", "primary-container": "#00f2ff",
                "secondary-fixed-dim": "#c9c6c5", "inverse-surface": "#dce4e4", "outline-variant": "#3a494b",
                "outline": "#849495", "surface-variant": "#2e3637"
            }, spacing: { "gutter": "16px" }, fontFamily: { "body-lg": ["Inter"], "label-caps": ["JetBrains Mono"], "data-md": ["JetBrains Mono"] } } }
        };
    </script>
</head>
<body class="bg-background text-on-surface font-body-lg overflow-hidden h-screen flex flex-col">

    </div>
    <div class="flex items-center gap-3">
        <button class="bg-primary-container text-on-primary-fixed px-3 h-8 rounded-sm font-label-caps text-[10px] flex items-center gap-1 hover:opacity-90 active:scale-95 transition-all cyan-glow" id="auth-btn">

            </button>

            <span class="material-symbols-outlined text-[28px]">menu</span>
        </button>

<div id="modal-container" class="hidden"></div>

<script>
    const TDF_CONFIG = {
        CLIENT_ID: '113481234677-vhtkocf6nsp7pm47figsdgm6vsdqlrea.apps.googleusercontent.com', 
        SCOPES: 'https://www.googleapis.com/auth/drive',
        DISCOVERY_DOCS: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
        WORKSPACE_ROOT: 'TianDao_Workspace',
        CONFIG_FILE: 'TianDao_Config.json',
        BOOKS_FILE: 'Books_Data.json'
    };

    const state = {
        tokenClient: null, gapiInited: false, gisInited: false,
        driveIds: { root: null, config: null },
        config: null,
        moduleData: {}, 
        booksFileId: null,
        books: [], 
        currentBookId: null,
        currentBookTab: 'meta',
        outlineData: {
            chapter: '001', version: 'V1.0', coreEvent: '',
            chapterSummaryRequirement: '', previousSummary: '',
            tabs: Array(4).fill(null).map(() => ({ scene: '', hook: '', actionText: '', characters: {} }))
        },
        currentView: 'system',
        currentTab: 0,
        isInitialized: false,
        navCollapsed: false,
        moduleSearchQuery: '',
        moduleCollapsedCategories: new Set(),
        moduleVisibleCategories: new Set(),
        moduleCategoriesInitialized: false,
        // 標籤管理系統狀態
        selectedModules: new Set(),
        tagFilter: null,
        tagSearchQuery: ''
    };

    function handleTokenResponse(resp) {
        if (resp.error !== undefined) {
            console.error('Token error:', resp);
            alert('登入失敗: ' + resp.error);
            return;
        }
        localStorage.setItem('tdf_access_token', resp.access_token);
        performPostLoginActions();
    }

    function attemptAutoLogin() {
        if (state.gapiInited && state.gisInited) {
            const savedToken = localStorage.getItem('tdf_access_token');
            if (savedToken) {
                gapi.client.setToken({ access_token: savedToken });
                performPostLoginActions();
            }
        }
    }

    function initGoogleApis() {
        if (typeof gapi === 'undefined' || typeof google === 'undefined' || !google.accounts) {
            setTimeout(initGoogleApis, 200);
            return;
        }
        
        gapi.load('client', async () => {
            await gapi.client.init({ discoveryDocs: TDF_CONFIG.DISCOVERY_DOCS });
            state.gapiInited = true;
            attemptAutoLogin();
        });

        state.tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: TDF_CONFIG.CLIENT_ID, scope: TDF_CONFIG.SCOPES, callback: handleTokenResponse,
        });
        state.gisInited = true;
        attemptAutoLogin();
    }

    async function performPostLoginActions() {
        document.getElementById('auth-btn-text').innerText = 'AGENT_AUTH';
        document.getElementById('auth-btn').classList.replace('bg-primary-container', 'bg-surface-container-highest');
        document.getElementById('logout-btn').classList.remove('hidden');
        
        document.getElementById('mask-status').innerText = 'LOCATING_WORKSPACE...';
        state.driveIds.root = await DriveAPI.findId(TDF_CONFIG.WORKSPACE_ROOT, null, true);
        if (!state.driveIds.root) {
            const res = await DriveAPI.createFolder(TDF_CONFIG.WORKSPACE_ROOT, null);
            state.driveIds.root = res.id;
        }

        document.getElementById('mask-status').innerText = 'CHECKING_CONFIG...';
        const configId = await DriveAPI.findId(TDF_CONFIG.CONFIG_FILE, state.driveIds.root, false);
        if (configId) {
            state.driveIds.config = configId;
            const content = await DriveAPI.getFileContent(configId);
            state.config = JSON.parse(content);
            state.isInitialized = true;
            document.getElementById('mask-status').innerText = 'LOADING_MODULES...';
            await ModuleLoader.loadAll(true);
        } else {
            alert('未找到 TianDao_Config.json，請先初始化環境。');
        }

        document.getElementById('mask-status').innerText = 'SYNCING_BOOKS...';
        await loadBooksData();
        
        document.getElementById('secure-mask').classList.add('hidden-mask');
        document.getElementById('main-app-content').classList.add('unlocked');
        renderCurrentView();
    }

    const DriveAPI = {
        async findId(name, parentId = null, isFolder = true) {
            const mime = isFolder ? "mimeType = 'application/vnd.google-apps.folder'" : "mimeType != 'application/vnd.google-apps.folder'";
            let q = `name = '${name}' and ${mime} and trashed = false`;
            if (parentId) q += ` and '${parentId}' in parents`;
            const resp = await gapi.client.drive.files.list({ q: q, fields: 'files(id, name)' });
            return resp.result.files.length > 0 ? resp.result.files[0].id : null;
        },
        async createFolder(name, parentId) {
            const token = gapi.client.getToken().access_token;
            const metadata = { name, parents: parentId ? [parentId] : [], mimeType: 'application/vnd.google-apps.folder' };
            const resp = await fetch('https://www.googleapis.com/drive/v3/files', {
                method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(metadata)
            });
            return resp.json();
        },
        async createFile(name, parentId, content) {
            const token = gapi.client.getToken().access_token;
            const metadata = { name, parents: parentId ? [parentId] : [], mimeType: 'application/json' };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', new Blob([content], { type: 'application/json' }));
            const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: form
            });
            return resp.json();
        },
        async getFileContent(fileId) {
            const resp = await gapi.client.drive.files.get({ fileId: fileId, alt: 'media' });
            return resp.body;
        },
        async updateFile(fileId, content) {
            const token = gapi.client.getToken().access_token;
            const metadata = { mimeType: 'application/json' };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', new Blob([content], { type: 'application/json' }));
            const resp = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`, {
                method: 'PATCH', headers: { 'Authorization': `Bearer ${token}` }, body: form
            });
            return resp.json();
        },
        async listFiles(parentId) {
            const q = `'${parentId}' in parents and trashed = false`;
            const resp = await gapi.client.drive.files.list({ q: q, fields: 'files(id, name)' });
            return resp.result.files || [];
        }
    };

    async function loadBooksData() {
        const fileId = await DriveAPI.findId(TDF_CONFIG.BOOKS_FILE, state.driveIds.root, false);
        if (fileId) {
            state.booksFileId = fileId;
            const content = await DriveAPI.getFileContent(fileId);
            state.books = JSON.parse(content);
            if (state.books.length > 0 && !state.currentBookId) {
                state.currentBookId = state.books[0].id;
            }
        } else {
            state.books = [];
        }
    }

    async function saveBooksData() {
        const jsonStr = JSON.stringify(state.books, null, 2);
        if (state.booksFileId) {
            await DriveAPI.updateFile(state.booksFileId, jsonStr);
        } else {
            const res = await DriveAPI.createFile(TDF_CONFIG.BOOKS_FILE, state.driveIds.root, jsonStr);
            state.booksFileId = res.id;
        }
        alert('書籍數據已同步至雲端！');
    }

    function getCurrentBook() {
        return state.books.find(b => b.id === state.currentBookId);
    }

    function createNewBook() {
        const name = prompt('請輸入新書名稱：');
        if (!name) return;
        const newBook = {
            id: 'book_' + Date.now(),
            title: name,
            style: '賽博龐克 / 懸疑',
            paragraphWordCount: 800,
            actors: [],
            scenes: [],
            chapters: [],
            outlinePromptConfig: { totalChapters: 10, mainActors: 3, wordCount: 5000 }
        };
        state.books.push(newBook);
        state.currentBookId = newBook.id;
        saveBooksData();
        renderCurrentView();
    }

    function deleteCurrentBook() {
        if (!confirm('確定要刪除當前書籍及其所有設定嗎？此操作不可復原。')) return;
        state.books = state.books.filter(b => b.id !== state.currentBookId);
        state.currentBookId = state.books.length > 0 ? state.books[0].id : null;
        saveBooksData();
        renderCurrentView();
    }

    const ModuleLoader = {
        INDEX_FILE_NAME: 'Modules_Index.json',
        
        parseModule(content, filename) {
            const codeMatch = content.match(/^\s*\[MOD_ID\]\s*[:：]\s*([A-Za-z0-9_]+)/m);
            const code = codeMatch ? codeMatch[1].trim() : filename.replace(/\.(txt|ahk)$/, '');
            const nameMatch = content.match(/^\s*\[NAME\]\s*[:：]\s*(.+?)\s*$/m);
            const name = nameMatch ? nameMatch[1].trim() : code;
            
            // 提取標籤
            const tagsMatch = content.match(/\[TAGS\]\s*[:：]\s*(.+)/i);
            const tags = tagsMatch ? tagsMatch[1].split(',').map(t => t.trim()).filter(t => t) : [];
            
            const extractField = (fieldName) => {
                const regex = new RegExp(`^\\s*\\[${fieldName}\\]\\s*[:：]\\s*(.*?)(?=\\r?\\n\\s*\\[|\\r?\\n\\s*[A-Z_]+\\s*[:：]|$)`, 'ms');
                const match = content.match(regex);
                return match ? match[1].trim() : '';
            };
            return {
                code, name, tags,
                description: extractField('DESCRIPTION') || extractField('EFFECT') || extractField('CORE_CONCEPT'),
                weight: parseFloat(extractField('WEIGHT')) || 0.5,
                blockedBy: extractField('BLOCKED_BY') || extractField('BLOCKED_ACTIONS'),
                alternatives: extractField('ALTERNATIVES'),
                duration: extractField('DURATION_TTL') || extractField('DURATION'), 
                rawContent: content
            };
        },
        
        async loadIndex() {
            const indexFileId = await DriveAPI.findId(this.INDEX_FILE_NAME, state.driveIds.root, false);
            if (!indexFileId) return null;
            const content = await DriveAPI.getFileContent(indexFileId);
            return JSON.parse(content);
        },
        
        buildStateFromIndex(indexData) {
            state.moduleData = {};
            if (!indexData.categories) return;
            for (const [category, modules] of Object.entries(indexData.categories)) {
                state.moduleData[category] = modules.map(mod => ({
                    code: mod.id,
                    name: mod.name,
                    fileId: mod.fileId,
                    category: category,
                    tags: mod.tags || [],
                    rawContent: null
                }));
            }
        },
        
        async buildAndSaveIndex() {
            const configId = await DriveAPI.findId(TDF_CONFIG.CONFIG_FILE, state.driveIds.root, false);
            if (configId) {
                const content = await DriveAPI.getFileContent(configId);
                state.config = JSON.parse(content);
            }

            const indexData = {
                meta: {
                    version: "1.0",
                    last_updated: new Date().toISOString(),
                    total_modules: 0,
                    scanned_categories: 0
                },
                categories: {}
            };
            
            let totalModules = 0;
            let scannedCategories = 0;
            
            for (const cat of state.config.categories) {
                let currentParentId = state.driveIds.root;
                
                for (const folderName of cat.path) {
                    let folderId = await DriveAPI.findId(folderName, currentParentId, true);
                    if (!folderId) {
                        console.log(`[Index] 自動建立缺失資料夾: ${folderName}`);
                        const res = await DriveAPI.createFolder(folderName, currentParentId);
                        folderId = res.id;
                    }
                    currentParentId = folderId;
                }
                
                scannedCategories++;
                const files = await DriveAPI.listFiles(currentParentId);
                indexData.categories[cat.key] = [];
                
                for (const file of files) {
                    const lowerName = file.name.toLowerCase();
                    if (lowerName.endsWith('.txt') && lowerName !== 'readme.txt') {
                        try {
                            const content = await DriveAPI.getFileContent(file.id);
                            const parsed = this.parseModule(content, file.name);
                            
                            if (parsed.code) {
                                indexData.categories[cat.key].push({
                                    id: parsed.code,
                                    name: parsed.name,
                                    fileId: file.id,
                                    tags: parsed.tags
                                });
                                totalModules++;
                            } else {
                                console.warn(`[Index] 檔案 ${file.name} 解析失敗，未找到 [MOD_ID]`);
                            }
                        } catch (e) {
                            console.error(`[Index] 讀取檔案 ${file.name} 失敗`, e);
                        }
                    }
                }
            }
            
            indexData.meta.total_modules = totalModules;
            indexData.meta.scanned_categories = scannedCategories;
            
            const jsonStr = JSON.stringify(indexData, null, 2);
            const existingIndexId = await DriveAPI.findId(this.INDEX_FILE_NAME, state.driveIds.root, false);
            if (existingIndexId) {
                await DriveAPI.updateFile(existingIndexId, jsonStr);
            } else {
                await DriveAPI.createFile(this.INDEX_FILE_NAME, state.driveIds.root, jsonStr);
            }
            
            console.log(`[Index] 重建完成！掃描了 ${scannedCategories} 個分類，共索引 ${totalModules} 個模組。`);
            return indexData;
        },
        
        async loadAll(useIndex = true) {
            if (!state.config || !state.driveIds.root) return;
            
            if (useIndex) {
                const indexData = await this.loadIndex();
                if (indexData) {
                    this.buildStateFromIndex(indexData);
                    return;
                }
            }
            
            state.moduleData = {};
            for (const cat of state.config.categories) {
                let currentParentId = state.driveIds.root;
                let validPath = true;
                for (const folderName of cat.path) {
                    const id = await DriveAPI.findId(folderName, currentParentId, true);
                    if (!id) { validPath = false; break; }
                    currentParentId = id;
                }
                if (!validPath) continue;
                const files = await DriveAPI.listFiles(currentParentId);
                state.moduleData[cat.key] = [];
                for (const file of files) {
                    const lowerName = file.name.toLowerCase();
                    if (lowerName.endsWith('.txt') && lowerName !== 'readme.txt') {
                        try {
                            const content = await DriveAPI.getFileContent(file.id);
                            const parsed = this.parseModule(content, file.name);
                            parsed.fileId = file.id;
                            parsed.category = cat.key;
                            state.moduleData[cat.key].push(parsed);
                        } catch (e) { console.error(`Error loading ${file.name}`, e); }
                    }
                }
            }
        }

    // 標籤管理系統函數
    async function updateModuleTags(fileId, newTags) {
        let content = await DriveAPI.getFileContent(fileId);
        content = content.replace(/\[TAGS\]\s*[:：]\s*.+/i, '');
        if (newTags.length > 0) {
            content += `\n[TAGS]: ${newTags.join(', ')}`;
        }
        await DriveAPI.updateFile(fileId, content);
        
        // 更新 state
        for (const catKey in state.moduleData) {
            const mod = state.moduleData[catKey].find(m => m.fileId === fileId);
            if (mod) {
                mod.tags = newTags;
                break;
            }
        }
    }

    async function removeTagFromModule(fileId, tagToRemove) {
        let content = await DriveAPI.getFileContent(fileId);
        const tagsMatch = content.match(/\[TAGS\]\s*[:：]\s*(.+)/i);
        let tags = [];
        if (tagsMatch) {
            tags = tagsMatch[1].split(',').map(t => t.trim()).filter(t => t && t !== tagToRemove);
            content = content.replace(/\[TAGS\]\s*[:：]\s*.+/i, '');
        }
        
        if (tags.length > 0) {
            content += `\n[TAGS]: ${tags.join(', ')}`;
        }
        
        await DriveAPI.updateFile(fileId, content);
        
        for (const catKey in state.moduleData) {
            const mod = state.moduleData[catKey].find(m => m.fileId === fileId);
            if (mod) {
                mod.tags = tags;
                break;
            }
        }
    }

    async function initializeEnvironment() {
        const mask = document.getElementById('mask-status');
        mask.innerText = 'INITIALIZING_STRUCTURE...';
        const createStructure = async (node, parentId) => {
            for (const [key, value] of Object.entries(node)) {
                mask.innerText = `SYNCING ${key}...`;
                let currentId = await DriveAPI.findId(key, parentId, true);
                if (!currentId) {
                    const res = await DriveAPI.createFolder(key, parentId);
                    currentId = res.id;
                }
                if (Array.isArray(value)) {
                    for (const fileName of value) {
                        if (!(await DriveAPI.findId(fileName, currentId, false))) {
                            const content = state.config.fileContents[fileName] || `// ${fileName} placeholder`;
                            await DriveAPI.createFile(fileName, currentId, content);
                        }
                    }
                } else if (typeof value === 'object' && value !== null) {
                    await createStructure(value, currentId);
                }
            }
        };
        await createStructure(state.config.structure, state.driveIds.root);
        state.isInitialized = true;
        await ModuleLoader.loadAll(true);
        renderCurrentView();
    }

            content.innerHTML = `
                <div class="glass-panel p-4 space-y-4 rounded-sm">
                    <div class="flex justify-between items-center">
                        <h3 class="font-label-caps text-xs text-primary-fixed-dim border-l-2 border-primary-container pl-2">${isActor ? '演員' : '場景'}總表與 OOP 關聯 (一對多)</h3>

                            <div class="bg-surface-container-high p-4 rounded-sm border border-outline-variant space-y-3 relative group">
                                <button data-idx="${idx}" class="del-item-btn absolute top-2 right-2 text-error hover:bg-error-container/20 p-1 rounded opacity-50 group-hover:opacity-100 transition-opacity"><span class="material-symbols-outlined text-[18px]">delete</span></button>
                                
                                <div class="grid grid-cols-1 gap-2">
                                    <div class="space-y-1">
                                        <label class="font-label-caps text-[10px] text-on-surface-variant">${isActor ? '演員名稱' : '場景名稱'}</label>
                                        <input type="text" value="${item.name || ''}" data-idx="${idx}" class="item-name-input w-full bg-surface border border-outline text-on-surface px-2 py-1.5 rounded-sm font-data-md text-sm" placeholder="輸入名稱...">

                                    </div>
                                </div>

                                <div class="space-y-2 border-t border-outline-variant pt-3">
                                    <div class="flex justify-between items-center">
                                        <label class="font-label-caps text-[10px] text-on-surface-variant">OOP 模組關聯 (Templates) - 可多選</label>
                                        <div class="flex gap-2">
                                            <button data-idx="${idx}" class="autolink-btn bg-surface-tint/20 text-primary-fixed-dim px-2 py-1 rounded-sm font-label-caps text-[10px] flex items-center gap-1 hover:bg-surface-tint/30"><span class="material-symbols-outlined text-[14px]">auto_awesome</span> AUTOLINK</button>
                                            <button data-idx="${idx}" class="add-mod-btn bg-surface-container-high text-on-surface px-2 py-1 rounded-sm font-label-caps text-[10px] border border-outline-variant">+ 手動添加</button>
                                        </div>
                                    </div>
                                    
                                    <div class="flex flex-wrap gap-2 min-h-[30px] p-2 bg-surface rounded-sm border border-outline-variant/50" id="mod-tags-container-${idx}">
                                        ${item.linkedModules.map(modCode => {
                                            const modInfo = allAvailableModules.find(m => m.code === modCode);
                                            const displayName = modInfo ? modInfo.name : modCode;
                                            return `
                                                <span class="inline-flex items-center gap-1 px-2 py-1 rounded-sm bg-primary-container/10 text-primary-fixed-dim text-xs border border-primary-container/30">
                                                    ${displayName}
                                                    <span class="cursor-pointer hover:text-error remove-mod-btn" data-idx="${idx}" data-code="${modCode}">×</span>

                                            `;
                                        }).join('')}

                                    </div>
                                </div>

                                <div class="space-y-1">
                                    <label class="font-label-caps text-[8px] text-on-surface-variant">自定義標籤 (Tags)</label>
                                    <input type="text" value="${item.tags || ''}" data-idx="${idx}" class="item-tags-input w-full bg-surface border border-outline text-on-surface px-1 py-1 rounded-sm font-data-md text-[10px]" placeholder="例：主角, 敵對">
                                </div>
                            </div>
                        `}).join('')}
                    </div>
                    <button id="save-list-btn" class="w-full bg-surface-container-high text-on-surface py-2 rounded-sm font-label-caps text-xs border border-outline-variant mb-8">💾 儲存${isActor ? '演員' : '場景'}池</button>
                </div>
            `;

            document.getElementById('add-item-btn').onclick = () => {
                list.push({ id: (isActor ? 'a_' : 's_') + Date.now(), name: '', description: '', linkedModules: [], tags: '' });
                renderBookTabContent();
            };
            
            document.getElementById('save-list-btn').onclick = () => {
                syncActorSceneInputs();
                saveBooksData();
                alert('已儲存！');
            };

            content.querySelectorAll('.del-item-btn').forEach(btn => {

                    list.splice(btn.dataset.idx, 1); 
                    renderBookTabContent();

            content.querySelectorAll('.remove-mod-btn').forEach(btn => {
                btn.onclick = (e) => {
                    syncActorSceneInputs(); 
                    const idx = parseInt(e.target.dataset.idx);
                    const code = e.target.dataset.code;
                    list[idx].linkedModules = list[idx].linkedModules.filter(c => c !== code);
                    renderBookTabContent();
                };

            content.querySelectorAll('.add-mod-btn').forEach(btn => {
                btn.onclick = (e) => openAddModuleModal(parseInt(e.target.dataset.idx), list, allAvailableModules);
            });

            content.querySelectorAll('.autolink-btn').forEach(btn => {
                btn.onclick = (e) => openAutolinkModal(parseInt(e.target.dataset.idx), list, allAvailableModules);
            });

        else if (state.currentBookTab === 'chapters') {
            content.innerHTML = `

                        <button id="add-chap-btn" class="bg-primary-container text-on-primary-fixed px-3 py-1.5 rounded-sm font-label-caps text-[10px] flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">add</span> 新增章節</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left font-data-md text-xs">
                            <thead class="border-b border-outline-variant text-on-surface-variant">
                                <tr><th class="py-2 px-2">編號</th><th class="py-2 px-2">章節名稱</th><th class="py-2 px-2">當前狀態</th><th class="py-2 px-2">操作</th></tr>
                            </thead>
                            <tbody>
                                ${book.chapters.length === 0 ? '<tr><td colspan="4" class="py-4 text-center text-on-surface-variant">尚無章節</td></tr>' : book.chapters.map((ch, idx) => `
                                    <tr class="border-b border-outline-variant/50 hover:bg-surface-container-highest">
                                        <td class="py-2 px-2"><input type="text" value="${ch.number}" data-idx="${idx}" class="chap-num w-16 bg-transparent border-b border-outline text-on-surface focus:outline-none focus:border-primary-fixed-dim"></td>
                                        <td class="py-2 px-2"><input type="text" value="${ch.name}" data-idx="${idx}" class="chap-name flex-1 bg-transparent border-b border-outline text-on-surface w-full focus:outline-none focus:border-primary-fixed-dim"></td>
                                        <td class="py-2 px-2">
                                            <select data-idx="${idx}" class="chap-status bg-surface border border-outline text-on-surface px-1 py-0.5 rounded-sm text-[10px]">
                                                <option value="Draft" ${ch.status === 'Draft' ? 'selected' : ''}>📝 草稿</option>
                                                <option value="In-Progress" ${ch.status === 'In-Progress' ? 'selected' : ''}>⚙️ 進行中</option>
                                                <option value="Completed" ${ch.status === 'Completed' ? 'selected' : ''}>✅ 已完成</option>
                                            </select>
                                        </td>
                                        <td class="py-2 px-2"><button data-idx="${idx}" class="del-chap-btn text-error hover:bg-error-container/20 p-1 rounded"><span class="material-symbols-outlined text-[16px]">delete</span></button></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    <button id="save-chaps-btn" class="w-full bg-surface-container-high text-on-surface py-2 rounded-sm font-label-caps text-xs border border-outline-variant mb-8">💾 儲存章節列表</button>
                </div>
            `;
            document.getElementById('add-chap-btn').onclick = () => {
                const nextNum = String(book.chapters.length + 1).padStart(3, '0');
                book.chapters.push({ id: 'c_' + Date.now(), number: nextNum, name: `第 ${nextNum} 章`, status: 'Draft' });
                renderBookTabContent();
            };
            document.getElementById('save-chaps-btn').onclick = () => {
                content.querySelectorAll('.chap-num').forEach(inp => book.chapters[inp.dataset.idx].number = inp.value);
                content.querySelectorAll('.chap-name').forEach(inp => book.chapters[inp.dataset.idx].name = inp.value);
                content.querySelectorAll('.chap-status').forEach(sel => book.chapters[sel.dataset.idx].status = sel.value);
                saveBooksData();
                alert('章節列表已更新！');
            };
            content.querySelectorAll('.del-chap-btn').forEach(btn => {
                btn.onclick = () => { book.chapters.splice(btn.dataset.idx, 1); renderBookTabContent(); };
            });
        }
    }

    function openAddModuleModal(idx, list, allAvailableModules) {
        const modal = document.getElementById('modal-container');
        modal.innerHTML = `
            <div class="modal-overlay">
                <div class="bg-surface border border-outline-variant rounded-sm w-full max-w-lg max-h-[80vh] flex flex-col">
                    <div class="p-4 border-b border-outline-variant flex justify-between items-center">
                        <div class="font-label-caps text-xs text-primary-fixed-dim">選擇模組進行關聯</div>
                        <button id="close-modal" class="text-on-surface-variant"><span class="material-symbols-outlined">close</span></button>
                    </div>
                    <div class="flex-1 overflow-y-auto p-4 space-y-2">
                        ${allAvailableModules.map(m => `
                            <div class="flex justify-between items-center p-2 bg-surface-container-high rounded-sm border border-outline-variant/50 hover:bg-surface-container-highest transition-colors">
                                <div>
                                    <div class="font-data-md text-sm text-on-surface">${m.name}</div>
                                    <div class="font-label-caps text-[8px] text-outline uppercase">${m.code}</div>
                                </div>
                                <button class="add-single-mod-btn bg-primary-container/20 text-primary-fixed-dim px-2 py-1 rounded-sm text-[10px]" data-code="${m.code}">添加</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
        modal.classList.remove('hidden');
        document.getElementById('close-modal').onclick = () => modal.classList.add('hidden');
        
        modal.querySelectorAll('.add-single-mod-btn').forEach(btn => {
            btn.onclick = () => {
                syncActorSceneInputs(); 
                const code = btn.dataset.code;
                if (!list[idx].linkedModules.includes(code)) {
                    list[idx].linkedModules.push(code);
                }
                modal.classList.add('hidden');
                renderBookTabContent();
            };
        });
    }

    function openAutolinkModal(idx, list, allAvailableModules) {
        const item = list[idx];
        const desc = item.description || item.name;
        if (!desc) {
            alert("請先填寫「角色/場景描述」，AI 需要依據描述來推薦模組！");
            return;
        }

        const modListStr = allAvailableModules.map(m => `- ${m.code} : ${m.name}`).join('\n');
        const promptText = `【天道流 AUTOLINK 推薦請求】\n角色/場景描述：${desc}\n\n當前可用模組庫：\n${modListStr}\n\n任務：請根據描述，從模組庫中推薦最合適的模組代碼（一對多關聯）。\n請嚴格返回 JSON 陣列格式，例如：["CHAR_A_BASE", "MOD_PERSONA_COLD"]。\n不要返回其他內容，只返回 JSON。`;

        const modal = document.getElementById('modal-container');
        modal.innerHTML = `
            <div class="modal-overlay">
                <div class="bg-surface border border-outline-variant rounded-sm w-full max-w-2xl p-6 space-y-4">
                    <h3 class="font-label-caps text-sm text-primary-fixed-dim">✨ AUTOLINK 智能推薦</h3>
                    <div class="space-y-2">
                        <label class="text-xs text-on-surface-variant">步驟 1：複製以下提示詞發送給 LLM</label>
                        <textarea readonly class="w-full bg-black/30 text-on-surface p-2 rounded text-xs h-32 font-mono">${promptText}</textarea>
                        <button id="copy-prompt-btn" class="bg-surface-container-high text-on-surface px-3 py-1 rounded text-xs">複製提示詞</button>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs text-on-surface-variant">步驟 2：將 LLM 返回的 JSON 結果貼上</label>
                        <textarea id="autolink-result-input" class="w-full bg-black/30 text-on-surface p-2 rounded text-xs h-20 font-mono" placeholder='例如：["CHAR_A_BASE", "MOD_PERSONA_COLD"]'></textarea>
                    </div>
                    <div class="flex justify-end gap-2 pt-2">
                        <button id="close-autolink-btn" class="bg-surface-container-high text-on-surface px-4 py-2 rounded text-xs">取消</button>
                        <button id="apply-autolink-btn" class="bg-primary-container text-on-primary-fixed px-4 py-2 rounded text-xs">載入並套用</button>
                    </div>
                </div>
            </div>
        `;
        modal.classList.remove('hidden');

        document.getElementById('copy-prompt-btn').onclick = () => {
            navigator.clipboard.writeText(promptText);
            alert('提示詞已複製！請去 LLM 對話框貼上並取得結果。');
        };
        document.getElementById('close-autolink-btn').onclick = () => modal.classList.add('hidden');
        
        document.getElementById('apply-autolink-btn').onclick = () => {
            const resultStr = document.getElementById('autolink-result-input').value;
            try {
                const parsedCodes = JSON.parse(resultStr);
                if (Array.isArray(parsedCodes)) {
                    syncActorSceneInputs(); 
                    list[idx].linkedModules = parsedCodes;
                    modal.classList.add('hidden');
                    renderBookTabContent();
                    alert(`成功載入 ${parsedCodes.length} 個推薦模組！`);
                } else {
                    alert('格式錯誤：LLM 返回的不是陣列。');
                }
            } catch (e) {
                alert('JSON 解析失敗，請確認 LLM 返回的是標準 JSON 格式 (例如 ["CODE1", "CODE2"])。');
            }
        };
    }

    function renderModulesView(container) {
        if (!state.moduleCategoriesInitialized) {
            state.config.categories.forEach(cat => state.moduleVisibleCategories.add(cat.key));
            state.moduleCategoriesInitialized = true;
        }
        
        let html = `
            <div class="p-gutter space-y-4 pb-40">
                <div class="glass-panel p-4 rounded-sm space-y-3">
                    <div class="space-y-1">
                        <label class="font-label-caps text-[10px] text-on-surface-variant">🔍 搜尋模組</label>
                        <input type="text" id="module-search" value="${state.moduleSearchQuery}" 
                               class="w-full bg-surface-container-high border border-outline text-on-surface px-3 py-2 rounded-sm font-data-md text-sm"
                               placeholder="輸入模組名稱或 ID...">
                    </div>
                    
                    <div class="space-y-2">
                        <div class="flex justify-between items-center">
                            <label class="font-label-caps text-[10px] text-on-surface-variant">📂 顯示類別 (可多選)</label>
                            <div class="flex gap-2">
                                <button id="select-all-cats" class="text-primary-fixed-dim text-[10px] hover:underline">全選</button>
                                <button id="deselect-all-cats" class="text-on-surface-variant text-[10px] hover:underline">全不選</button>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            ${state.config.categories.map(cat => `
                                <label class="flex items-center gap-1 bg-surface-container-high px-2 py-1 rounded-sm cursor-pointer hover:bg-surface-container-highest transition-colors">
                                    <input type="checkbox" class="cat-checkbox rounded text-primary-container" data-key="${cat.key}" 
                                           ${state.moduleVisibleCategories.has(cat.key) ? 'checked' : ''}>
                                    <span class="font-data-md text-[10px]">${cat.label}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                    
                    <!-- 批量操作區域 -->
                    <div class="border-t border-outline-variant pt-3">
                        <div class="flex justify-between items-center mb-2">
                            <label class="font-label-caps text-[10px] text-on-surface-variant">📦 批量操作 (已選: <span id="selected-count">${state.selectedModules.size}</span> 個)</label>
                            <div class="flex gap-2">
                                <button id="batch-add-tag-btn" class="bg-primary-container/20 text-primary-fixed-dim px-2 py-1 rounded-sm text-[10px] ${state.selectedModules.size === 0 ? 'opacity-50 cursor-not-allowed' : ''}">批量添加標籤</button>
                                <button id="batch-remove-tag-btn" class="bg-error-container/20 text-error px-2 py-1 rounded-sm text-[10px] ${state.selectedModules.size === 0 ? 'opacity-50 cursor-not-allowed' : ''}">批量移除標籤</button>
                            </div>
                        </div>
                    </div>
                </div>
        `;
        
        for (const cat of state.config.categories) {
            if (!state.moduleVisibleCategories.has(cat.key)) continue;
            
            const mods = state.moduleData[cat.key] || [];
            
            const filteredMods = mods.filter(m => {
                if (!state.moduleSearchQuery) return true;
                const query = state.moduleSearchQuery.toLowerCase();
                return m.name.toLowerCase().includes(query) || 
                       m.code.toLowerCase().includes(query);
            });
            
            const isCollapsed = state.moduleCollapsedCategories.has(cat.key);
            
            html += `
                <div class="space-y-2">
                    <div class="flex items-center justify-between">
                        <h3 class="font-label-caps text-[10px] text-on-surface-variant border-l-2 border-primary-container pl-2">
                            ${cat.label} (${filteredMods.length}/${mods.length})
                        </h3>
                        <button class="collapse-btn text-on-surface-variant hover:text-primary-fixed-dim p-1" data-key="${cat.key}">
                            <span class="material-symbols-outlined text-[18px]">${isCollapsed ? 'expand_more' : 'expand_less'}</span>
                        </button>
                    </div>
                    ${!isCollapsed ? `
                        <div class="grid grid-cols-1 gap-2">
                            ${filteredMods.length === 0 ? '<div class="text-xs text-on-surface-variant glass-panel p-2 rounded">無符合條件的模組</div>' : 
                            filteredMods.map(m => `
                                <div class="glass-panel p-3 rounded-sm flex justify-between items-center hover:bg-surface-container-highest transition-colors">
                                    <div class="flex items-center gap-3 flex-1">
                                        <input type="checkbox" class="module-checkbox rounded text-primary-container" data-fileid="${m.fileId}" 
                                               ${state.selectedModules.has(m.fileId) ? 'checked' : ''}>
                                        <div class="flex-1">
                                            <div class="font-data-md text-sm text-on-surface">${m.name}</div>
                                            <div class="font-label-caps text-[8px] text-outline uppercase">${m.code}</div>
                                            ${m.tags && m.tags.length > 0 ? `
                                                <div class="flex flex-wrap gap-1 mt-1">
                                                    ${m.tags.map(tag => `<span class="text-[8px] px-1 bg-primary-container/20 text-primary-fixed-dim rounded">${tag}</span>`).join('')}
                                                </div>
                                            ` : ''}
                                        </div>
                                    </div>
                                    <button class="edit-module-btn text-on-surface-variant hover:text-primary-fixed-dim p-1" data-fileid="${m.fileId}" data-catkey="${cat.key}">
                                        <span class="material-symbols-outlined text-[18px]">edit</span>
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
            `;
        }
        
        html += `</div>`;
        container.innerHTML = html;
        
        const searchInput = document.getElementById('module-search');
        if (searchInput) {
            searchInput.oninput = (e) => {
                state.moduleSearchQuery = e.target.value;
                const cursorPos = e.target.selectionStart;
                renderModulesView(container);
                const newInput = document.getElementById('module-search');
                if (newInput) {
                    newInput.focus();
                    newInput.setSelectionRange(cursorPos, cursorPos);
                }
            };
        }
        
        document.querySelectorAll('.cat-checkbox').forEach(cb => {
            cb.onchange = (e) => {
                const key = e.target.dataset.key;
                if (e.target.checked) {
                    state.moduleVisibleCategories.add(key);
                } else {
                    state.moduleVisibleCategories.delete(key);
                }
                renderModulesView(container);
                const searchInput = document.getElementById('module-search');
                if (searchInput) {
                    searchInput.focus();
                }
            };
        });
        
        document.getElementById('select-all-cats').onclick = () => {
            state.config.categories.forEach(cat => state.moduleVisibleCategories.add(cat.key));
            renderModulesView(container);
            const searchInput = document.getElementById('module-search');
            if (searchInput) {
                searchInput.focus();
            }
        };
        
        document.getElementById('deselect-all-cats').onclick = () => {
            state.moduleVisibleCategories.clear();
            renderModulesView(container);
            const searchInput = document.getElementById('module-search');
            if (searchInput) {
                searchInput.focus();
            }
        };
        
        document.querySelectorAll('.collapse-btn').forEach(btn => {
            btn.onclick = (e) => {
                const key = e.currentTarget.dataset.key;
                if (state.moduleCollapsedCategories.has(key)) {
                    state.moduleCollapsedCategories.delete(key);
                } else {
                    state.moduleCollapsedCategories.add(key);
                }
                renderModulesView(container);
                const searchInput = document.getElementById('module-search');
                if (searchInput) {
                    searchInput.focus();
                }
            };
        });
        
        // 模組勾選事件
        document.querySelectorAll('.module-checkbox').forEach(cb => {
            cb.onchange = (e) => {
                const fileId = e.target.dataset.fileid;
                if (e.target.checked) {
                    state.selectedModules.add(fileId);
                } else {
                    state.selectedModules.delete(fileId);
                }
                document.getElementById('selected-count').innerText = state.selectedModules.size;
                document.getElementById('batch-add-tag-btn').classList.toggle('opacity-50', state.selectedModules.size === 0);
                document.getElementById('batch-add-tag-btn').classList.toggle('cursor-not-allowed', state.selectedModules.size === 0);
                document.getElementById('batch-remove-tag-btn').classList.toggle('opacity-50', state.selectedModules.size === 0);
                document.getElementById('batch-remove-tag-btn').classList.toggle('cursor-not-allowed', state.selectedModules.size === 0);
            };
        });
        
        // 編輯模組按鈕
        document.querySelectorAll('.edit-module-btn').forEach(btn => {
            btn.onclick = (e) => {
                const fileId = e.currentTarget.dataset.fileid;
                const catKey = e.currentTarget.dataset.catkey;
                openModuleEditor(fileId, catKey);
            };
        });
        
        // 批量操作按鈕
        document.getElementById('batch-add-tag-btn').onclick = () => {
            if (state.selectedModules.size === 0) return;
            const tag = prompt(`請輸入要添加的標籤 (將添加到 ${state.selectedModules.size} 個模組):`);
            if (tag && tag.trim()) {
                batchAddTag(tag.trim());
            }
        };
        
        document.getElementById('batch-remove-tag-btn').onclick = () => {
            if (state.selectedModules.size === 0) return;
            const tag = prompt(`請輸入要移除的標籤 (將從 ${state.selectedModules.size} 個模組移除):`);
            if (tag && tag.trim()) {
                batchRemoveTag(tag.trim());
            }
        };
    }

    async function batchAddTag(tag) {
        document.getElementById('mask-status').innerText = 'BATCH ADDING TAG...';
        document.getElementById('secure-mask').classList.remove('hidden-mask');
        
        for (const fileId of state.selectedModules) {
            let content = await DriveAPI.getFileContent(fileId);
            const tagsMatch = content.match(/\[TAGS\]\s*[:：]\s*(.+)/i);
            let tags = [];
            if (tagsMatch) {
                tags = tagsMatch[1].split(',').map(t => t.trim()).filter(t => t);
                content = content.replace(/\[TAGS\]\s*[:：]\s*.+/i, '');
            }
            
            if (!tags.includes(tag)) {
                tags.push(tag);
            }
            
            if (tags.length > 0) {
                content += `\n[TAGS]: ${tags.join(', ')}`;
            }
            
            await DriveAPI.updateFile(fileId, content);
            
            // 更新 state
            for (const catKey in state.moduleData) {
                const mod = state.moduleData[catKey].find(m => m.fileId === fileId);
                if (mod) {
                    mod.tags = tags;
                    break;
                }
            }
        }
        
        document.getElementById('secure-mask').classList.add('hidden-mask');
        renderCurrentView();
        alert(`已為 ${state.selectedModules.size} 個模組添加標籤 "${tag}"`);
    }

    async function batchRemoveTag(tag) {
        document.getElementById('mask-status').innerText = 'BATCH REMOVING TAG...';
        document.getElementById('secure-mask').classList.remove('hidden-mask');
        
        for (const fileId of state.selectedModules) {
            await removeTagFromModule(fileId, tag);
        }
        
        document.getElementById('secure-mask').classList.add('hidden-mask');
        renderCurrentView();
        alert(`已從 ${state.selectedModules.size} 個模組移除標籤 "${tag}"`);
    }

    function openModuleEditor(fileId, catKey) {
        const mod = state.moduleData[catKey].find(m => m.fileId === fileId);
        if (!mod) return;
        
        const loadAndEdit = async () => {
            if (!mod.rawContent) {
                document.getElementById('mask-status').innerText = 'FETCHING_MODULE...';
                document.getElementById('secure-mask').classList.remove('hidden-mask');
                mod.rawContent = await DriveAPI.getFileContent(mod.fileId);
                document.getElementById('secure-mask').classList.add('hidden-mask');
            }
            renderModuleEditorModal(mod, catKey);
        };
        loadAndEdit();
    }

    function renderModuleEditorModal(mod, catKey) {
        const modal = document.getElementById('modal-container');
        modal.classList.remove('hidden');
        modal.innerHTML = `
            <div class="modal-overlay">
                <div class="bg-surface border border-outline-variant rounded-sm w-full max-w-2xl h-[80vh] flex flex-col">
                    <div class="p-4 border-b border-outline-variant flex justify-between items-center">

                    </div>
                    <textarea id="editor-content" class="flex-1 p-4 bg-black/20 text-on-surface font-data-md text-sm resize-none focus:ring-0 border-none">${mod.rawContent}</textarea>
                    <div class="p-4 border-t border-outline-variant flex gap-2">
                        <button id="save-overwrite" class="flex-1 bg-primary-container text-on-primary-fixed py-2 rounded-sm font-label-caps text-xs">💾 覆寫原模組</button>
                        <button id="save-as" class="flex-1 bg-surface-container-high text-on-surface py-2 rounded-sm font-label-caps text-xs border border-outline-variant">📄 另存新模組</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('close-modal').onclick = () => modal.classList.add('hidden');
        document.getElementById('save-overwrite').onclick = async () => {
            const content = document.getElementById('editor-content').value;
            await DriveAPI.updateFile(mod.fileId, content);
            mod.rawContent = content;
            modal.classList.add('hidden');
            alert('模組已覆寫！');
        };
        
        document.getElementById('save-as').onclick = async () => {
            const newName = prompt('請輸入新模組名稱 (不含 .txt):'); if (!newName) return;
            const content = document.getElementById('editor-content').value;
            const cat = state.config.categories.find(c => c.key === catKey);
            
            if (!cat) {
                alert('錯誤：找不到對應的分類配置！');
                return;
            }
            
            let currentParentId = state.driveIds.root;
            for (const folderName of cat.path) {
                let folderId = await DriveAPI.findId(folderName, currentParentId, true);
                if (!folderId) {
                    const res = await DriveAPI.createFolder(folderName, currentParentId);
                    folderId = res.id;
                }
                currentParentId = folderId;
            }
            
            await DriveAPI.createFile(`${newName}.txt`, currentParentId, content);
            await ModuleLoader.buildAndSaveIndex();
            await ModuleLoader.loadAll(true);
            modal.classList.add('hidden');
            renderCurrentView();
            alert('新模組已儲存，索引已更新！');
        };
    }

    }

    function renderTriggersView(container) {
        const prompts = state.config.prompts || { "AUDIT": "【自我審計協議】\n請執行自我審計，檢查上述生成內容是否違反當前生效模組。" };
        const book = getCurrentBook();
        container.innerHTML = `
            <div class="p-gutter space-y-4 pb-40">
                <h2 class="font-label-caps text-sm text-primary-fixed-dim border-l-2 border-primary-container pl-2">自我思維觸發器</h2>
                <div class="grid grid-cols-2 gap-2">
                    ${Object.keys(prompts).map(key => `<button class="trigger-btn bg-surface-container-high text-on-surface p-3 rounded-sm font-label-caps text-[10px] border border-outline-variant flex flex-col items-center gap-1 active:bg-surface-bright" data-prompt="${key}"><span class="material-symbols-outlined text-primary-fixed-dim">psychology</span>${key}</button>`).join('')}
                </div>
                <h2 class="font-label-caps text-sm text-primary-fixed-dim border-l-2 border-primary-container pl-2 mt-6">大綱預覽與導出</h2>
                <div class="glass-panel p-3 rounded-sm"><pre id="outline-preview" class="font-data-md text-[10px] text-on-surface-variant whitespace-pre-wrap max-h-[300px] overflow-y-auto"></pre></div>
                <div class="grid grid-cols-2 gap-2">
                    <button id="refresh-preview" class="bg-surface-container-high text-on-surface py-2 rounded-sm font-label-caps text-xs border border-outline-variant">🔄 更新預覽</button>
                    <button id="copy-outline" class="bg-primary-container text-on-primary-fixed py-2 rounded-sm font-label-caps text-xs flex items-center justify-center gap-1 cyan-glow"><span class="material-symbols-outlined text-[16px]">content_copy</span> 複製全部大綱</button>
                </div>
            </div>
        `;
        document.querySelectorAll('.trigger-btn').forEach(btn => { btn.onclick = () => { navigator.clipboard.writeText(prompts[btn.dataset.prompt]); alert(`已複製 ${btn.dataset.prompt} 觸發器指令！`); }; });
        document.getElementById('refresh-preview').onclick = () => { document.getElementById('outline-preview').innerText = generateOutline(); };
        document.getElementById('copy-outline').onclick = () => { navigator.clipboard.writeText(generateOutline()); alert('大綱已複製到剪貼簿！'); };
        document.getElementById('outline-preview').innerText = generateOutline();
    }

    function generateOutline() {
        const d = state.outlineData;
        const book = getCurrentBook();
        let outline = `[CHAPTER_${d.chapter}_${d.version}]\n`;
        if (book) outline += `[BOOK_META]: 書名《${book.title}》 | 風格：${book.style} | 段落字數限制：${book.paragraphWordCount}字\n`;
        if (d.previousSummary) outline += `### 前章總結參考依據\n${d.previousSummary}\n\n`;
        outline += `### 本章核心事件\n${d.coreEvent}\n\n`;
        if (d.chapterSummaryRequirement) outline += `### 本章總結需求調整\n${d.chapterSummaryRequirement}\n\n`;

        const tabNames = ["起", "承", "轉", "合"];
        for (let i = 0; i < 4; i++) {
            const tab = d.tabs[i];
            outline += `【${tabNames[i]}】\n`;
            const sceneObj = book ? book.scenes.find(s => s.id === tab.scene) : null;
            if (sceneObj) outline += `- 全局場景：${sceneObj.name} ${sceneObj.oopCode ? '['+sceneObj.oopCode+']' : ''}\n`;
            if (tab.hook) outline += `- HOOK承接詞：${tab.hook}\n`;
            outline += "- 出場人物:\n";
            let hasChars = false;
            for (const charId in tab.characters) {
                const charData = tab.characters[charId];
                const charObj = book ? book.actors.find(a => a.id === charId) : null;
                if (charData.checked && charObj) {
                    hasChars = true;
                    outline += `  - [${charObj.name}] ${charObj.oopCode ? '['+charObj.oopCode+']' : ''}:\n`;
                    
                    if (charObj.linkedModules && charObj.linkedModules.length > 0) {
                        outline += `    - OOP 模組關聯 (Templates):\n`;
                        charObj.linkedModules.forEach(modCode => {
                            let modName = modCode;
                            for (const catKey in state.moduleData) {
                                const mod = state.moduleData[catKey].find(m => m.code === modCode);
                                if (mod) {
                                    modName = mod.name;
                                    break;
                                }
                            }
                            outline += `      - ${modName} [${modCode}]\n`;
                        });
                    }
                    
                    const labelMap = {};
                    state.config.outlineModTypes.forEach(mt => labelMap[mt.key] = mt.label);
                    for (const key in charData.settings) {
                        const s = charData.settings[key];
                        if (s.name) outline += `    - ${labelMap[key] || key}: ${s.name}\n`;
                        if (s.must) outline += `    - [MUST_EXECUTE (${labelMap[key] || key})]: ${s.must}\n`;
                        if (s.forbid) outline += `    - [FORBIDDEN_EXECUTE (${labelMap[key] || key})]: ${s.forbid}\n`;
                    }
                }
            }
            if (!hasChars) outline += "  - (無)\n";
            if (tab.actionText) outline += `- 全局動作描述：${tab.actionText}\n`;
            outline += "\n";
        }
        outline += `[SYSTEM_INSTRUCTION]: 請根據上述大綱與 OOP 實例模組生成正文，嚴格遵守段落字數限制，並在文末嚴格按照 <sd_prompt> 格式輸出帶權重的視覺提示詞。`;
        return outline;
    }

    document.getElementById('auth-btn').addEventListener('click', () => {
        if (!state.tokenClient) {
            alert('Google 登入服務尚未載入完成，請稍候片刻或檢查網路連線。');
            return;
        }
        if (gapi.client.getToken()) { performPostLoginActions(); return; }
        state.tokenClient.requestAccessToken({prompt: 'consent'});
    });
    document.getElementById('logout-btn').addEventListener('click', () => { localStorage.removeItem('tdf_access_token'); gapi.client.setToken(null); location.reload(); });
    document.querySelectorAll('.nav-btn').forEach(btn => { btn.onclick = () => { state.currentView = btn.dataset.view; renderCurrentView(); }; });
    
    function toggleNav(collapse) {
        const expanded = document.getElementById('nav-expanded');
        const collapsed = document.getElementById('nav-collapsed');
        const mainContent = document.getElementById('main-app-content');
        
        if (collapse) {
            expanded.style.display = 'none';
            collapsed.classList.remove('hidden');
            setTimeout(() => collapsed.classList.add('show'), 10);
            mainContent.classList.remove('mb-16');
            mainContent.classList.add('mb-2');
            state.navCollapsed = true;
        } else {
            collapsed.classList.remove('show');
            setTimeout(() => {
                collapsed.classList.add('hidden');
                expanded.style.display = 'flex';
            }, 250);
            mainContent.classList.add('mb-16');
            mainContent.classList.remove('mb-2');
            state.navCollapsed = false;
        }
    }
    document.getElementById('nav-collapse-btn').addEventListener('click', () => toggleNav(true));
    document.getElementById('nav-expand-btn').addEventListener('click', () => toggleNav(false));

    window.addEventListener('load', initGoogleApis);
</script>
</body>
</html>
