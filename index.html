<head>

  <!-- Tailwind CSS v3 CDN -->

  <script>

        extend: {

            obsidian: '#0d1515',

            neonCyanDim: 'rgba(0, 242, 255, 0.1)',

    body {
      background-color: #0d1515;
      color: #e2e8f0;
      font-family: 'Noto Sans TC', sans-serif;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    
    ::-webkit-scrollbar { width: 6px; height: 4px; }
    ::-webkit-scrollbar-track { background: #0d1515; }
    ::-webkit-scrollbar-thumb { background: #2a3a3a; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #00f2ff; }

    .border-glow { border: 1px solid #2a3a3a; transition: border-color 0.3s ease, box-shadow 0.3s ease; }
    .border-glow:focus-within { border-color: #00f2ff; box-shadow: 0 0 8px rgba(0, 242, 255, 0.2); }

    input, textarea, select {
      background-color: #1a2626 !important;
      border: 1px solid #2a3a3a !important;
      color: #00f2ff !important;
      font-size: 16px !important; 
    }
    input:focus, textarea:focus, select:focus {
      outline: none !important;

      ring: 0 !important;
    }

    .neon-text { color: #00f2ff; text-shadow: 0 0 5px rgba(0, 242, 255, 0.5); }

    @media (max-width: 640px) {

      .hide-scrollbar::-webkit-scrollbar { display: none; }
    }

    .secure-mask {
      position: fixed; inset: 0; background: #0d1515; z-index: 9999; 
      display: flex; align-items: center; justify-content: center; 
      color: #00f2ff; font-family: 'JetBrains Mono', monospace; font-size: 14px;

    #main-app-content { opacity: 0; transition: opacity 0.5s ease; }
    #main-app-content.unlocked { opacity: 1; }
  </style>

<!-- TDF Core Logic Script -->
<script>
    const TDF_CONFIG = {
        CLIENT_ID: '113481234677-vhtkocf6nsp7pm47figsdgm6vsdqlrea.apps.googleusercontent.com', 
        SCOPES: 'https://www.googleapis.com/auth/drive',
        DISCOVERY_DOCS: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
        WORKSPACE_ROOT: 'TianDao_Workspace',
        TARGET_FILE: 'config.json',
    };

    const state = {
        tokenClient: null, gapiInited: false, gisInited: false, selectedAction: null,
        physiologicalStates: { blindness: true }, uiData: null
    };

    function gapiLoaded() { gapi.load('client', initializeGapiClient); }
    async function initializeGapiClient() {
        await gapi.client.init({ discoveryDocs: TDF_CONFIG.DISCOVERY_DOCS });
        state.gapiInited = true;
    }
    function gisLoaded() {
        state.tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: TDF_CONFIG.CLIENT_ID,
            scope: TDF_CONFIG.SCOPES,
            callback: '', 
        });
        state.gisInited = true;
    }

    async function getDriveIdByName(name, parentId = null, isFolder = true) {
        const mimeType = isFolder ? "mimeType = 'application/vnd.google-apps.folder'" : "mimeType != 'application/vnd.google-apps.folder'";
        let q = `name = '${name}' and ${mimeType} and trashed = false`;
        if (parentId) q += ` and '${parentId}' in parents`;

        const resp = await gapi.client.drive.files.list({ q: q, fields: 'files(id, name)' });
        if (resp.result.files.length > 0) return resp.result.files[0].id;
        return null;
    }

    async function getFilesInFolder(folderId) {
        if (!folderId) return [];
        const q = `'${folderId}' in parents and mimeType != 'application/vnd.google-apps.folder' and trashed = false`;
        const resp = await gapi.client.drive.files.list({ q: q, fields: 'files(id, name)' });
        return resp.result.files;
    }

    async function fetchCharacterModules(files) {
        return await Promise.all(files.map(async (f) => {
            try {
                const resp = await gapi.client.drive.files.get({ fileId: f.id, alt: 'media' });
                const text = resp.body || "";
                
                const idMatch = text.match(/^\[(.*?)\]/m) || text.match(/\[(CHAR_[a-zA-Z0-9_]+)\]/);
                const nameMatch = text.match(/NAME:\s*(.+)/i);

                const modId = idMatch ? `[${idMatch[1]}]` : `[${f.name.replace(/\.txt$/i, '')}]`;
                const modName = nameMatch ? nameMatch[1].trim() : f.name.replace(/\.txt$/i, '');

                return { id: modId, name: modName };
            } catch(e) {
                console.warn(`無法讀取角色檔案內容: ${f.name}`);
                const fallbackName = f.name.replace(/\.txt$/i, '');
                return { id: `[${fallbackName}]`, name: fallbackName };
            }
        }));
    }

    function getIconForAction(actionName) {
        if (actionName.includes('射擊') || actionName.includes('攻擊')) return 'target';
        if (actionName.includes('掃描') || actionName.includes('偵測')) return 'search';
        if (actionName.includes('移動') || actionName.includes('撤退')) return 'directions_run';
        return 'bolt';
    }

    async function fetchSystemConfig() {
        try {
            document.getElementById('secure-mask').innerText = 'LOCATING_WORKSPACE...';
            const rootId = await getDriveIdByName(TDF_CONFIG.WORKSPACE_ROOT, null, true);
            if (!rootId) throw new Error(`找不到根目錄：${TDF_CONFIG.WORKSPACE_ROOT}`);

            document.getElementById('secure-mask').innerText = 'ACCESSING_CENTRAL_CORE...';
            const coreId = await getDriveIdByName('01_CENTRAL_CORE', rootId, true);
            
            const sysId = await getDriveIdByName('00_SYSTEM', coreId, true);
            const fileId = await getDriveIdByName(TDF_CONFIG.TARGET_FILE, sysId, false);
            let configData = {};
            if (fileId) {
                const response = await gapi.client.drive.files.get({ fileId: fileId, alt: 'media' });
                try { configData = JSON.parse(response.body); } catch (e) {}
            }

            document.getElementById('secure-mask').innerText = 'SCANNING_DYNAMIC_MODULES...';
            const [charFolderId, sceneFolderId, actFolderId] = await Promise.all([
                getDriveIdByName('01_CHARACTERS', coreId, true),
                getDriveIdByName('02_SCENES', coreId, true),
                getDriveIdByName('03_ACTIONS', coreId, true)
            ]);

            const [charFilesRaw, sceneFilesRaw, actFilesRaw] = await Promise.all([
                getFilesInFolder(charFolderId),
                getFilesInFolder(sceneFolderId),
                getFilesInFolder(actFolderId)
            ]);

            document.getElementById('secure-mask').innerText = 'EXTRACTING_MODULE_DATA...';
            const charactersExtracted = await fetchCharacterModules(charFilesRaw);

            if (!configData.modules) configData.modules = {};
            
            if (charactersExtracted.length > 0) configData.modules.characters = charactersExtracted;
            
            if (sceneFilesRaw.length > 0) {
                configData.modules.scenes = sceneFilesRaw.map(f => f.name.replace(/\.txt$/i, ''));
            }
            if (actFilesRaw.length > 0) {
                configData.modules.actions = actFilesRaw.map(f => {
                    const cleanName = f.name.replace(/\.txt$/i, '');
                    return { id: cleanName, name: cleanName, version: "Dynamic", icon: getIconForAction(cleanName) };
                });
            }

            state.uiData = configData;
            renderUI(configData);
            
            document.getElementById('secure-mask').classList.add('hidden-mask');
            document.getElementById('main-app-content').classList.add('unlocked');
            
        } catch (e) {
            console.error('資料載入失敗', e);
            document.getElementById('secure-mask').innerText = 'ERROR: ' + e.message;
        }
    }

    function renderUI(config) {
        if (!config) return;

        if (config?.ui) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (config.ui[key]) {
                    el.innerText = config.ui[key];
                    if(el.tagName === 'TITLE') document.title = config.ui[key];
                }
            });
        }

        // 渲染角色選單
        if (config?.modules?.characters && Array.isArray(config.modules.characters)) {
            document.getElementById('char-select').innerHTML = config.modules.characters.map(c => {
                if (typeof c === 'string') return `<option value="${c}">${c}</option>`;
                return `<option value="${c.id}">${c.name}</option>`;
            }).join('');
        }
        
        // 渲染場景選單
        if (config?.modules?.scenes && Array.isArray(config.modules.scenes)) {
            document.getElementById('scene-select').innerHTML = config.modules.scenes.map(s => {
                if (typeof s === 'string') return `<option value="${s}">${s}</option>`;
                return `<option value="${s.id}">${s.name}</option>`;
            }).join('');
        }

        // 渲染動作下拉選單
        const actionSelect = document.getElementById('action-select');
        actionSelect.innerHTML = '';
        if (config?.modules?.actions && Array.isArray(config.modules.actions)) {
            config.modules.actions.forEach((act, index) => {
                if (index === 0) state.selectedAction = act.id; 
                const option = document.createElement('option');
                option.value = act.id;
                option.text = act.name;
                actionSelect.appendChild(option);
            });
            
            actionSelect.addEventListener('change', function() {
                state.selectedAction = this.value;
                runAuditEngine();
            });
        }

        if (config?.default_prompt) {
            document.getElementById('prompt-editor').value = config.default_prompt;
        }

        runAuditEngine();
    }

    function runAuditEngine() {
        if(!state.uiData) return;
        const auditPanel = document.getElementById('audit-alert');
        const reasonSpan = document.getElementById('audit-reason');
        const targetSpan = document.getElementById('audit-action-target');
        const promptText = document.getElementById('prompt-editor').value || '';

        const isShootingSelected = state.selectedAction && state.selectedAction.includes('射擊');
        const hasBlindness = state.physiologicalStates.blindness;
        const hasBlockedTagInText = promptText.includes('[PHYS_BLIND_RIGHT_EYE]');
        const blockedByRegex = /BLOCKED_BY:\s*([^\]\r\n]+)/i;
        const match = promptText.match(blockedByRegex);

        if (isShootingSelected && (hasBlindness || hasBlockedTagInText || match)) {
            auditPanel.classList.remove('hidden');
            targetSpan.innerText = state.selectedAction;
            reasonSpan.innerText = match ? match[1].trim() : '右眼生理失明 [PHYS_BLIND_RIGHT_EYE]';
        } else {
            auditPanel.classList.add('hidden');
        }
    }

    // 注入指令邏輯
    document.getElementById('inject-btn').addEventListener('click', () => {
        const charId = document.getElementById('char-select').value; 
        const scene = document.getElementById('scene-select').value;
        const action = state.selectedAction;
        const editor = document.getElementById('prompt-editor');
        
        const injectStr = `\n// --- 指令注入 ---\n目標實體: ${charId}\n行為呼叫: [${action}]\n環境載入: ${scene}\n`;
        editor.value = (editor.value.trim() + injectStr).trim() + "\n";
        
        const originalText = "▶️ 注入指令";
        document.getElementById('inject-btn').innerText = "✅ 注入成功";
        setTimeout(() => document.getElementById('inject-btn').innerText = originalText, 1500);
        
        runAuditEngine();
    });

    // 登入事件
    document.getElementById('auth-btn').addEventListener('click', () => {
        if (!state.tokenClient) return;
        state.tokenClient.callback = async (resp) => {
            if (resp.error !== undefined) throw (resp);
            document.getElementById('auth-btn-text').innerText = 'AGENT_AUTH';
            document.getElementById('auth-btn').classList.replace('bg-[#2d4d4d]', 'bg-surface-container-highest');
            await fetchSystemConfig();
        };
        if (gapi.client.getToken() === null) {
            state.tokenClient.requestAccessToken({prompt: 'consent'});
        } else {
            state.tokenClient.requestAccessToken({prompt: ''});
        }
    });

    document.getElementById('prompt-editor').addEventListener('input', runAuditEngine);

    window.onload = () => { gapiLoaded(); gisLoaded(); };
</script>
</body>
</html>
