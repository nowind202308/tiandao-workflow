<!DOCTYPE html>
<html class="dark" lang="zh-TW">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Project Controller</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script async defer src="https://accounts.google.com/gsi/client"></script>
    <script async defer src="https://apis.google.com/js/api.js"></script>
    
    <style>
        .glass-panel { background: rgba(21, 29, 30, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(132, 148, 149, 0.1); }
        .scanline { width: 100%; height: 2px; background: rgba(0, 219, 231, 0.05); position: absolute; top: 0; animation: scan 8s linear infinite; z-index: 10; pointer-events: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .cyan-glow { box-shadow: 0 0 15px rgba(0, 219, 231, 0.15); }
        .active-nav-item { color: #00f2ff; border-top: 2px solid #00f2ff; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #080f10; }
        ::-webkit-scrollbar-thumb { background: #3a494b; border-radius: 2px; }
        
        #main-app-content { opacity: 0; pointer-events: none; transition: opacity 0.5s ease, margin-bottom 0.3s ease; }
        #main-app-content.unlocked { opacity: 1; pointer-events: auto; }
        .secure-mask { position: fixed; inset: 0; background: #080f10; z-index: 40; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #00dbe7; font-family: 'JetBrains Mono', monospace; font-size: 12px; transition: opacity 0.5s ease; gap: 10px; }
        .secure-mask.hidden-mask { opacity: 0; pointer-events: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .tab-active { border-bottom: 2px solid #00f2ff; color: #00f2ff; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }

        #main-nav { transform: translateY(0); transition: transform 0.3s ease-in-out; }
        #main-nav.nav-hidden { transform: translateY(100%); }
        #nav-expanded { opacity: 1; transition: opacity 0.3s ease; }
        #nav-collapsed { opacity: 0; transform: scale(0.5); transition: opacity 0.3s ease, transform 0.3s ease; }
        #nav-collapsed.show { opacity: 1; transform: scale(1); }
        
        /* 分類收起動畫 */
        .category-content { max-height: 5000px; overflow: hidden; transition: max-height 0.3s ease-out, opacity 0.3s ease; opacity: 1; }
        .category-content.collapsed { max-height: 0; opacity: 0; }
        .category-toggle { transition: transform 0.3s ease; }
        .category-toggle.rotated { transform: rotate(-90deg); }
        
        /* 搜尋高亮 */
        .search-highlight { background-color: rgba(0, 242, 255, 0.2); border-radius: 2px; padding: 0 2px; }
    </style>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: {
                "on-primary-fixed": "#002022", "surface-container-low": "#151d1e", "inverse-on-surface": "#2a3232",
                "on-primary-container": "#006a71", "surface-tint": "#00dbe7", "secondary-fixed": "#e5e2e1",
                "primary-fixed": "#74f5ff", "surface-container-lowest": "#080f10", "on-secondary-container": "#bab8b7",
                "surface": "#0d1515", "error-container": "#93000a", "surface-container-highest": "#2e3637",
                "surface-dim": "#0d1515", "inverse-primary": "#00696f", "on-secondary": "#313030",
                "primary-fixed-dim": "#00dbe7", "on-tertiary-fixed": "#291800", "on-surface-variant": "#b9cacb",
                "on-tertiary": "#452b00", "tertiary-container": "#ffd49d", "on-surface": "#dce4e4",
                "on-error-container": "#ffdad6", "tertiary": "#fff6ef", "surface-container": "#192122",
                "background": "#0d1515", "on-primary": "#00363a", "on-primary-fixed-variant": "#004f54",
                "on-error": "#690005", "error": "#ffb4ab", "on-secondary-fixed": "#1c1b1b",
                "on-tertiary-container": "#845600", "surface-container-high": "#232b2c", "secondary": "#c9c6c5",
                "on-tertiary-fixed-variant": "#633f00", "secondary-container": "#4a4949", "primary": "#e1fdff",
                "tertiary-fixed": "#ffddb4", "on-secondary-fixed-variant": "#474646", "tertiary-fixed-dim": "#ffb952",
                "on-background": "#dce4e4", "surface-bright": "#333b3b", "primary-container": "#00f2ff",
                "secondary-fixed-dim": "#c9c6c5", "inverse-surface": "#dce4e4", "outline-variant": "#3a494b",
                "outline": "#849495", "surface-variant": "#2e3637"
            }, spacing: { "gutter": "16px" }, fontFamily: { "body-lg": ["Inter"], "label-caps": ["JetBrains Mono"], "data-md": ["JetBrains Mono"] } } }
        };
    </script>
</head>
<body class="bg-background text-on-surface font-body-lg overflow-hidden h-screen flex flex-col">

<div id="secure-mask" class="secure-mask">
    <span class="material-symbols-outlined text-4xl animate-pulse">terminal</span>
    <div id="mask-status">SYSTEM_LOCKED :: WAITING_FOR_AUTH(V1.5.013)</div>
</div>

<header class="fixed top-0 w-full z-50 flex justify-between items-center px-4 h-14 bg-surface border-b border-outline-variant">
    <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-primary-fixed-dim text-[20px]">terminal</span>
        <h1 class="font-label-caps text-[10px] tracking-wider text-primary-fixed-dim uppercase leading-none">Project Controller(V1.5.013)</h1>
    </div>
    <div class="flex items-center gap-3">
        <button class="bg-primary-container text-on-primary-fixed px-3 h-8 rounded-sm font-label-caps text-[10px] flex items-center gap-1 hover:opacity-90 active:scale-95 transition-all cyan-glow" id="auth-btn">
            <span class="material-symbols-outlined text-[16px]">account_circle</span>
            <span id="auth-btn-text">LOGIN</span>
        </button>
        <button id="logout-btn" class="hidden text-on-surface-variant hover:bg-surface-container-high p-1.5 rounded transition-colors" title="登出">

        </button>

</header>

<div id="main-app-content" class="flex-1 mt-14 mb-16 overflow-y-auto relative flex flex-col hide-scrollbar">
    <div class="scanline"></div>
    <div id="view-container" class="flex-1 flex flex-col"></div>
</div>

<nav id="main-nav" class="fixed bottom-0 w-full z-50 transition-all duration-300 ease-in-out">
    <div id="nav-expanded" class="h-16 bg-surface-container border-t border-outline-variant flex items-center px-2 relative">
        <div class="flex items-center justify-around flex-1">
            <button class="nav-btn flex flex-col items-center gap-1 text-on-surface-variant pt-2 pb-1 px-2" data-view="system">
                <span class="material-symbols-outlined text-[20px]">settings_input_component</span>
                <span class="font-label-caps text-[8px] uppercase">System</span>
            </button>
            <button class="nav-btn flex flex-col items-center gap-1 text-on-surface-variant pt-2 pb-1 px-2" data-view="books">
                <span class="material-symbols-outlined text-[20px]">library_books</span>
                <span class="font-label-caps text-[8px] uppercase">Books</span>
            </button>
            <button class="nav-btn flex flex-col items-center gap-1 text-on-surface-variant pt-2 pb-1 px-2" data-view="modules">
                <span class="material-symbols-outlined text-[20px]">database</span>
                <span class="font-label-caps text-[8px] uppercase">Modules</span>
            </button>
            <button class="nav-btn flex flex-col items-center gap-1 text-on-surface-variant pt-2 pb-1 px-2" data-view="outline">
                <span class="material-symbols-outlined text-[20px]">edit_document</span>
                <span class="font-label-caps text-[8px] uppercase">Outline</span>
            </button>
            <button class="nav-btn flex flex-col items-center gap-1 text-on-surface-variant pt-2 pb-1 px-2" data-view="triggers">
                <span class="material-symbols-outlined text-[20px]">psychology</span>
                <span class="font-label-caps text-[8px] uppercase">Triggers</span>
            </button>
        </div>
        <button id="nav-collapse-btn" class="absolute right-1 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-surface-container-high text-on-surface-variant hover:bg-primary-container hover:text-on-primary-fixed flex items-center justify-center transition-all" title="收起選單">
            <span class="material-symbols-outlined text-[18px]">keyboard_arrow_down</span>
        </button>
    </div>
    
    <div id="nav-collapsed" class="hidden fixed bottom-4 right-4 z-50">
        <button id="nav-expand-btn" class="w-14 h-14 rounded-full bg-primary-container text-on-primary-fixed shadow-2xl flex items-center justify-center cyan-glow hover:scale-110 active:scale-95 transition-transform" title="展開選單">
            <span class="material-symbols-outlined text-[28px]">menu</span>
        </button>
    </div>
</nav>

<div id="modal-container" class="hidden"></div>

<script>
    const TDF_CONFIG = {
        CLIENT_ID: '113481234677-vhtkocf6nsp7pm47figsdgm6vsdqlrea.apps.googleusercontent.com', 
        SCOPES: 'https://www.googleapis.com/auth/drive',
        DISCOVERY_DOCS: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
        WORKSPACE_ROOT: 'TianDao_Workspace',
        CONFIG_FILE: 'TianDao_Config.json',
        BOOKS_FILE: 'Books_Data.json'
    };

    const state = {
        tokenClient: null, gapiInited: false, gisInited: false,
        driveIds: { root: null, config: null },
        config: null,
        moduleData: {}, 
        booksFileId: null,
        books: [], 
        currentBookId: null,
        currentBookTab: 'meta',
        outlineData: {
            chapter: '001', version: 'V1.0', coreEvent: '',
            chapterSummaryRequirement: '', previousSummary: '',
            tabs: Array(4).fill(null).map(() => ({ scene: '', hook: '', actionText: '', characters: {} }))
        },
        currentView: 'system',
        currentTab: 0,
        isInitialized: false,
        navCollapsed: false,
        // === 新增：Modules 搜尋與篩選狀態 ===
        moduleSearchQuery: '',
        moduleCategoryFilter: new Set(), // 勾選的類別
        moduleCollapsedCategories: new Set(), // 收起的分類
        moduleFilterPanelOpen: false // 篩選面板是否展開
    };

    function handleTokenResponse(resp) {
        if (resp.error !== undefined) {
            console.error('Token error:', resp);
            alert('登入失敗: ' + resp.error);
            return;
        }
        localStorage.setItem('tdf_access_token', resp.access_token);
        performPostLoginActions();
    }

    function attemptAutoLogin() {
        if (state.gapiInited && state.gisInited) {
            const savedToken = localStorage.getItem('tdf_access_token');
            if (savedToken) {
                gapi.client.setToken({ access_token: savedToken });
                performPostLoginActions();
            }
        }
    }

    function initGoogleApis() {
        if (typeof gapi === 'undefined' || typeof google === 'undefined' || !google.accounts) {
            setTimeout(initGoogleApis, 200);
            return;
        }
        
        gapi.load('client', async () => {
            await gapi.client.init({ discoveryDocs: TDF_CONFIG.DISCOVERY_DOCS });
            state.gapiInited = true;
            attemptAutoLogin();
        });

        state.tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: TDF_CONFIG.CLIENT_ID, scope: TDF_CONFIG.SCOPES, callback: handleTokenResponse,
        });
        state.gisInited = true;
        attemptAutoLogin();
    }

    async function performPostLoginActions() {
        document.getElementById('auth-btn-text').innerText = 'AGENT_AUTH';
        document.getElementById('auth-btn').classList.replace('bg-primary-container', 'bg-surface-container-highest');
        document.getElementById('logout-btn').classList.remove('hidden');
        
        document.getElementById('mask-status').innerText = 'LOCATING_WORKSPACE...';
        state.driveIds.root = await DriveAPI.findId(TDF_CONFIG.WORKSPACE_ROOT, null, true);
        if (!state.driveIds.root) {
            const res = await DriveAPI.createFolder(TDF_CONFIG.WORKSPACE_ROOT, null);
            state.driveIds.root = res.id;
        }

        document.getElementById('mask-status').innerText = 'CHECKING_CONFIG...';
        const configId = await DriveAPI.findId(TDF_CONFIG.CONFIG_FILE, state.driveIds.root, false);
        if (configId) {
            state.driveIds.config = configId;
            const content = await DriveAPI.getFileContent(configId);
            state.config = JSON.parse(content);
            state.isInitialized = true;
            document.getElementById('mask-status').innerText = 'LOADING_MODULES...';
            await ModuleLoader.loadAll();
            
            // 初始化類別篩選（預設全選）
            state.moduleCategoryFilter = new Set(state.config.categories.map(c => c.key));
        }

        document.getElementById('mask-status').innerText = 'SYNCING_BOOKS...';
        await loadBooksData();
        
        document.getElementById('secure-mask').classList.add('hidden-mask');
        document.getElementById('main-app-content').classList.add('unlocked');
        renderCurrentView();
    }

    const DriveAPI = {
        async findId(name, parentId = null, isFolder = true) {
            const mime = isFolder ? "mimeType = 'application/vnd.google-apps.folder'" : "mimeType != 'application/vnd.google-apps.folder'";
            let q = `name = '${name}' and ${mime} and trashed = false`;
            if (parentId) q += ` and '${parentId}' in parents`;
            const resp = await gapi.client.drive.files.list({ q: q, fields: 'files(id, name)' });
            return resp.result.files.length > 0 ? resp.result.files[0].id : null;
        },
        async createFolder(name, parentId) {
            const token = gapi.client.getToken().access_token;
            const metadata = { name, parents: parentId ? [parentId] : [], mimeType: 'application/vnd.google-apps.folder' };
            const resp = await fetch('https://www.googleapis.com/drive/v3/files', {
                method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(metadata)
            });
            return resp.json();
        },
        async createFile(name, parentId, content) {
            const token = gapi.client.getToken().access_token;
            const metadata = { name, parents: parentId ? [parentId] : [], mimeType: 'application/json' };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', new Blob([content], { type: 'application/json' }));
            const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: form
            });
            return resp.json();
        },
        async getFileContent(fileId) {
            const resp = await gapi.client.drive.files.get({ fileId: fileId, alt: 'media' });
            return resp.body;
        },
        async updateFile(fileId, content) {
            const token = gapi.client.getToken().access_token;
            const metadata = { mimeType: 'application/json' };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', new Blob([content], { type: 'application/json' }));
            const resp = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`, {
                method: 'PATCH', headers: { 'Authorization': `Bearer ${token}` }, body: form
            });
            return resp.json();
        },
        async listFiles(parentId) {
            const q = `'${parentId}' in parents and trashed = false`;
            const resp = await gapi.client.drive.files.list({ q: q, fields: 'files(id, name)' });
            return resp.result.files || [];
        }
    };

    async function loadBooksData() {
        const fileId = await DriveAPI.findId(TDF_CONFIG.BOOKS_FILE, state.driveIds.root, false);
        if (fileId) {
            state.booksFileId = fileId;
            const content = await DriveAPI.getFileContent(fileId);
            state.books = JSON.parse(content);
            if (state.books.length > 0 && !state.currentBookId) {
                state.currentBookId = state.books[0].id;
            }
        } else {
            state.books = [];
        }
    }

    async function saveBooksData() {
        const jsonStr = JSON.stringify(state.books, null, 2);
        if (state.booksFileId) {
            await DriveAPI.updateFile(state.booksFileId, jsonStr);
        } else {
            const res = await DriveAPI.createFile(TDF_CONFIG.BOOKS_FILE, state.driveIds.root, jsonStr);
            state.booksFileId = res.id;
        }
        alert('書籍數據已同步至雲端！');
    }

    function getCurrentBook() {
        return state.books.find(b => b.id === state.currentBookId);
    }

    function createNewBook() {
        const name = prompt('請輸入新書名稱：');
        if (!name) return;
        const newBook = {
            id: 'book_' + Date.now(),
            title: name,
            style: '賽博龐克 / 懸疑',
            paragraphWordCount: 800,
            actors: [],
            scenes: [],
            chapters: [],
            outlinePromptConfig: { totalChapters: 10, mainActors: 3, wordCount: 5000 }
        };
        state.books.push(newBook);
        state.currentBookId = newBook.id;
        saveBooksData();
        renderCurrentView();
    }

    function deleteCurrentBook() {
        if (!confirm('確定要刪除當前書籍及其所有設定嗎？此操作不可復原。')) return;
        state.books = state.books.filter(b => b.id !== state.currentBookId);
        state.currentBookId = state.books.length > 0 ? state.books[0].id : null;
        saveBooksData();
        renderCurrentView();
    }

    const ModuleLoader = {
        parseModule(content, filename) {
            const codeMatch = content.match(/^\s*\[MOD_ID\]\s*[:：]\s*([A-Za-z0-9_]+)/m);
            const code = codeMatch ? codeMatch[1].trim() : filename.replace(/\.(txt|ahk)$/, '');
            
            const nameMatch = content.match(/^\s*\[NAME\]\s*[:：]\s*(.+?)\s*$/m);
            const name = nameMatch ? nameMatch[1].trim() : code;
            
            const extractField = (fieldName) => {
                const regex = new RegExp(`^\\s*\\[${fieldName}\\]\\s*[:：]\\s*(.*?)(?=\\r?\\n\\s*\\[|\\r?\\n\\s*[A-Z_]+\\s*[:：]|$)`, 'ms');
                const match = content.match(regex);
                return match ? match[1].trim() : '';
            };
            
            return {
                code, name,
                description: extractField('DESCRIPTION') || extractField('EFFECT') || extractField('CORE_CONCEPT'),
                weight: parseFloat(extractField('WEIGHT')) || 0.5,
                blockedBy: extractField('BLOCKED_BY') || extractField('BLOCKED_ACTIONS'),
                alternatives: extractField('ALTERNATIVES'),
                duration: extractField('DURATION_TTL') || extractField('DURATION'), 
                rawContent: content
            };
        },
        async loadAll() {
            if (!state.config || !state.driveIds.root) return;
            state.moduleData = {};
            for (const cat of state.config.categories) {
                let currentParentId = state.driveIds.root;
                let validPath = true;
                for (const folderName of cat.path) {
                    const id = await DriveAPI.findId(folderName, currentParentId, true);
                    if (!id) { validPath = false; break; }
                    currentParentId = id;
                }
                if (!validPath) continue;
                const files = await DriveAPI.listFiles(currentParentId);
                state.moduleData[cat.key] = [];
                for (const file of files) {
                    if (file.name.endsWith('.txt') && file.name !== 'README.txt') {
                        try {
                            const content = await DriveAPI.getFileContent(file.id);
                            const parsed = this.parseModule(content, file.name);
                            parsed.fileId = file.id;
                            parsed.category = cat.key;
                            state.moduleData[cat.key].push(parsed);
                        } catch (e) { console.error(`Error loading ${file.name}`, e); }
                    }
                }
            }
        }
    };

    async function initializeEnvironment() {
        const mask = document.getElementById('mask-status');
        mask.innerText = 'INITIALIZING_STRUCTURE...';
        const createStructure = async (node, parentId) => {
            for (const [key, value] of Object.entries(node)) {
                mask.innerText = `SYNCING ${key}...`;
                let currentId = await DriveAPI.findId(key, parentId, true);
                if (!currentId) {
                    const res = await DriveAPI.createFolder(key, parentId);
                    currentId = res.id;
                }
                if (Array.isArray(value)) {
                    for (const fileName of value) {
                        if (!(await DriveAPI.findId(fileName, currentId, false))) {
                            const content = state.config.fileContents[fileName] || `// ${fileName} placeholder`;
                            await DriveAPI.createFile(fileName, currentId, content);
                        }
                    }
                } else if (typeof value === 'object' && value !== null) {
                    await createStructure(value, currentId);
                }
            }
        };
        await createStructure(state.config.structure, state.driveIds.root);
        state.isInitialized = true;
        await ModuleLoader.loadAll();
        // 初始化類別篩選
        state.moduleCategoryFilter = new Set(state.config.categories.map(c => c.key));
        renderCurrentView();
    }

    function renderCurrentView() {
        const container = document.getElementById('view-container');
        container.innerHTML = '';
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.toggle('active-nav-item', btn.dataset.view === state.currentView);
            btn.classList.toggle('text-on-surface-variant', btn.dataset.view !== state.currentView);
        });

        if (!state.isInitialized && state.currentView !== 'system') {
            container.innerHTML = `<div class="p-gutter text-center text-on-surface-variant">請先在 System 頁面載入配置並初始化環境。</div>`;
            return;
        }

        switch (state.currentView) {
            case 'system': renderSystemView(container); break;
            case 'books': renderBooksView(container); break;
            case 'modules': renderModulesView(container); break;
            case 'outline': renderOutlineView(container); break;
            case 'triggers': renderTriggersView(container); break;
        }
    }

    function renderSystemView(container) {
        if (!state.config) {
            renderUploadConfigView(container);
            return;
        }
        container.innerHTML = `
            <div class="p-gutter space-y-4 pb-40">
                <h2 class="font-label-caps text-sm text-primary-fixed-dim border-l-2 border-primary-container pl-2">專案環境狀態</h2>
                <div class="glass-panel p-4 rounded-sm space-y-3">
                    <div class="flex justify-between items-center"><span class="font-data-md text-sm">Root Workspace:</span><span class="font-data-md text-sm ${state.driveIds.root ? 'text-green-400' : 'text-error'}">${state.driveIds.root || 'NOT FOUND'}</span></div>
                    <div class="flex justify-between items-center"><span class="font-data-md text-sm">Config Version:</span><span class="font-data-md text-sm text-primary-fixed-dim">${state.config.version || 'Unknown'}</span></div>
                    <div class="flex justify-between items-center"><span class="font-data-md text-sm">Total Modules:</span><span class="font-data-md text-sm text-primary-fixed-dim">${Object.values(state.moduleData).reduce((a, b) => a + b.length, 0)}</span></div>
                    <div class="flex justify-between items-center"><span class="font-data-md text-sm">Total Books:</span><span class="font-data-md text-sm text-primary-fixed-dim">${state.books.length}</span></div>
                </div>
                <button id="init-btn" class="w-full bg-primary-container text-on-primary-fixed py-3 rounded-sm font-label-caps text-sm flex items-center justify-center gap-2 active:opacity-80 transition-all cyan-glow"><span class="material-symbols-outlined">rocket_launch</span> 一鍵初始化專案環境</button>

    function renderUploadConfigView(container) {
        container.innerHTML = `
            <div class="p-gutter flex flex-col items-center justify-center h-full space-y-6 pb-40">
                <div class="text-center space-y-2">
                    <span class="material-symbols-outlined text-6xl text-primary-fixed-dim">cloud_upload</span>
                    <h2 class="font-label-caps text-lg text-on-surface">未偵測到專案配置檔</h2>
                    <p class="font-data-md text-sm text-on-surface-variant">請上傳 <code class="bg-surface-container-high px-1 rounded">TianDao_Config.json</code> 以初始化環境。</p>
                </div>
                <input type="file" id="config-file-input" accept=".json" class="hidden">
                <button id="upload-config-btn" class="bg-primary-container text-on-primary-fixed px-6 py-3 rounded-sm font-label-caps text-sm flex items-center gap-2 cyan-glow"><span class="material-symbols-outlined">upload_file</span> 選擇配置檔並上傳</button>
            </div>
        `;
        document.getElementById('upload-config-btn').onclick = () => document.getElementById('config-file-input').click();
        document.getElementById('config-file-input').onchange = async (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    state.config = JSON.parse(event.target.result);
                    document.getElementById('mask-status').innerText = 'UPLOADING_CONFIG...';
                    document.getElementById('secure-mask').classList.remove('hidden-mask');
                    await DriveAPI.createFile(TDF_CONFIG.CONFIG_FILE, state.driveIds.root, JSON.stringify(state.config, null, 2));
                    await initializeEnvironment();
                    document.getElementById('secure-mask').classList.add('hidden-mask');
                } catch (err) { alert('配置檔解析失敗：' + err.message); }
            };
            reader.readAsText(file);
        };
    }

            const idx = parseInt(inp.dataset.idx);

    function openAddModuleModal(idx, list, allAvailableModules) {
        const modal = document.getElementById('modal-container');
        modal.innerHTML = `
            <div class="modal-overlay">
                <div class="bg-surface border border-outline-variant rounded-sm w-full max-w-lg max-h-[80vh] flex flex-col">
                    <div class="p-4 border-b border-outline-variant flex justify-between items-center">
                        <div class="font-label-caps text-xs text-primary-fixed-dim">選擇模組進行關聯</div>
                        <button id="close-modal" class="text-on-surface-variant"><span class="material-symbols-outlined">close</span></button>
                    </div>
                    <div class="flex-1 overflow-y-auto p-4 space-y-2">
                        ${allAvailableModules.map(m => `
                            <div class="flex justify-between items-center p-2 bg-surface-container-high rounded-sm border border-outline-variant/50 hover:bg-surface-container-highest transition-colors">
                                <div>
                                    <div class="font-data-md text-sm text-on-surface">${m.name}</div>
                                    <div class="font-label-caps text-[8px] text-outline uppercase">${m.code}</div>
                                </div>
                                <button class="add-single-mod-btn bg-primary-container/20 text-primary-fixed-dim px-2 py-1 rounded-sm text-[10px]" data-code="${m.code}">添加</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
        modal.classList.remove('hidden');
        document.getElementById('close-modal').onclick = () => modal.classList.add('hidden');
        
        modal.querySelectorAll('.add-single-mod-btn').forEach(btn => {
            btn.onclick = () => {
                syncActorSceneInputs(); 
                const code = btn.dataset.code;
                if (!list[idx].linkedModules.includes(code)) {
                    list[idx].linkedModules.push(code);
                }
                modal.classList.add('hidden');
                renderBookTabContent();
            };
        });

        const modListStr = allAvailableModules.map(m => `- ${m.code} : ${m.name}`).join('\n');
        const promptText = `【天道流 AUTOLINK 推薦請求】\n角色/場景描述：${desc}\n\n當前可用模組庫：\n${modListStr}\n\n任務：請根據描述，從模組庫中推薦最合適的模組代碼（一對多關聯）。\n請嚴格返回 JSON 陣列格式，例如：["CHAR_A_BASE", "MOD_PERSONA_COLD"]。\n不要返回其他內容，只返回 JSON。`;

        const modal = document.getElementById('modal-container');
        modal.innerHTML = `
            <div class="modal-overlay">
                <div class="bg-surface border border-outline-variant rounded-sm w-full max-w-2xl p-6 space-y-4">

                    <div class="space-y-2">
                        <label class="text-xs text-on-surface-variant">步驟 1：複製以下提示詞發送給 LLM</label>

                        <button id="copy-prompt-btn" class="bg-surface-container-high text-on-surface px-3 py-1 rounded text-xs">複製提示詞</button>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs text-on-surface-variant">步驟 2：將 LLM 返回的 JSON 結果貼上</label>
                        <textarea id="autolink-result-input" class="w-full bg-black/30 text-on-surface p-2 rounded text-xs h-20 font-mono" placeholder='例如：["CHAR_A_BASE", "MOD_PERSONA_COLD"]'></textarea>

                    <div class="flex justify-end gap-2 pt-2">
                        <button id="close-autolink-btn" class="bg-surface-container-high text-on-surface px-4 py-2 rounded text-xs">取消</button>

        document.getElementById('copy-prompt-btn').onclick = () => {

        document.getElementById('close-autolink-btn').onclick = () => modal.classList.add('hidden');

                alert('JSON 解析失敗，請確認 LLM 返回的是標準 JSON 格式 (例如 ["CODE1", "CODE2"])。');

    // === 新增：Modules 搜尋與篩選輔助函數 ===
    function filterModulesBySearch(modules, query) {
        if (!query || query.trim() === '') return modules;
        const lowerQuery = query.toLowerCase().trim();
        return modules.filter(m => 
            m.name.toLowerCase().includes(lowerQuery) || 
            m.code.toLowerCase().includes(lowerQuery)
        );
    }

    function highlightText(text, query) {
        if (!query || query.trim() === '') return text;
        const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return text.replace(regex, '<span class="search-highlight">$1</span>');
    }

    // === 核心升級：Modules 頁面渲染 ===

        // 計算符合搜尋條件的模組數
        let filteredTotalCount = 0;
        categories.forEach(cat => {
            if (selectedCategories.has(cat.key)) {

                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-2 top-1/2 -translate-y-1/2 text-on-surface-variant text-[18px]">search</span>
                        <input 
                            type="text" 
                            id="module-search-input" 
                            value="${query}"
                            placeholder="搜尋模組名稱或代碼..."
                            class="w-full bg-surface border border-outline text-on-surface pl-9 pr-9 py-2 rounded-sm font-data-md text-sm focus:outline-none focus:border-primary-container"

                            <button id="clear-search-btn" class="absolute right-2 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface">
                                <span class="material-symbols-outlined text-[18px]">close</span>

                    <!-- 篩選面板（可展開） -->

                            <div class="flex items-center justify-between">
                                <span class="font-label-caps text-[10px] text-on-surface-variant">類別篩選 (多選)</span>
                                <div class="flex gap-2">
                                    <button id="select-all-categories-btn" class="text-primary-fixed-dim text-[10px] hover:underline">全選</button>
                                    <span class="text-on-surface-variant text-[10px]">|</span>
                                    <button id="deselect-all-categories-btn" class="text-on-surface-variant text-[10px] hover:underline">全不選</button>
                                </div>
                            </div>
                            <div class="flex flex-wrap gap-2">

                                    const count = (state.moduleData[cat.key] || []).length;
                                    const isSelected = selectedCategories.has(cat.key);
                                    return `
                                        <label class="inline-flex items-center gap-1 px-2 py-1 rounded-sm cursor-pointer transition-colors ${isSelected ? 'bg-primary-container/20 text-primary-fixed-dim border border-primary-container/30' : 'bg-surface-container-high text-on-surface-variant border border-outline-variant hover:bg-surface-container-highest'}">

        let hasAnyVisibleCategory = false;

        categories.forEach(cat => {
            // 檢查類別是否被勾選
            if (!selectedCategories.has(cat.key)) return;
            
            const allMods = state.moduleData[cat.key] || [];
            const filteredMods = filterModulesBySearch(allMods, query);
            
            // 如果搜尋後沒有結果，隱藏該分類
            if (filteredMods.length === 0) return;
            
            hasAnyVisibleCategory = true;
            const isCollapsed = collapsedCategories.has(cat.key);

            html += `
                <div class="space-y-2">
                    <!-- 分類標題（可點擊收起/打開） -->
                    <div class="flex items-center justify-between bg-surface-container-high p-2 rounded-sm cursor-pointer hover:bg-surface-container-highest transition-colors category-header" data-cat="${cat.key}">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-primary-fixed-dim text-[18px] category-toggle ${isCollapsed ? 'rotated' : ''}">expand_more</span>

                                        <div class="font-data-md text-sm text-on-surface truncate">${highlightText(m.name, query)}</div>
                                        <div class="font-label-caps text-[8px] text-outline uppercase truncate">${highlightText(m.code, query)}</div>

                                </div>

                        </div>
                    </div>

        if (!hasAnyVisibleCategory) {
            html += `
                <div class="text-center py-10 space-y-3">
                    <span class="material-symbols-outlined text-5xl text-on-surface-variant">search_off</span>
                    <div class="font-data-md text-sm text-on-surface-variant">

                    </div>
                    ${query ? '<button id="reset-search-btn" class="text-primary-fixed-dim text-xs hover:underline">清除搜尋</button>' : ''}
                </div>
            `;
        }

        html += `
                </div>
            </div>
        `;

        container.innerHTML = html;

        // === 事件綁定 ===
        
        // 搜尋框
        const searchInput = document.getElementById('module-search-input');
        if (searchInput) {
            searchInput.oninput = (e) => {
                state.moduleSearchQuery = e.target.value;
                renderModulesView(container);
                // 重新聚焦搜尋框並保持游標位置
                const newInput = document.getElementById('module-search-input');
                if (newInput) {
                    newInput.focus();
                    newInput.setSelectionRange(newInput.value.length, newInput.value.length);
                }
            };
        }

        // 清除搜尋
        const clearSearchBtn = document.getElementById('clear-search-btn');
        if (clearSearchBtn) {
            clearSearchBtn.onclick = () => {
                state.moduleSearchQuery = '';
                renderModulesView(container);
            };
        }

        // 重置搜尋（無結果時）
        const resetSearchBtn = document.getElementById('reset-search-btn');
        if (resetSearchBtn) {
            resetSearchBtn.onclick = () => {
                state.moduleSearchQuery = '';
                renderModulesView(container);
            };
        }

        // 切換篩選面板
        const toggleFilterBtn = document.getElementById('toggle-filter-panel-btn');
        if (toggleFilterBtn) {
            toggleFilterBtn.onclick = () => {
                state.moduleFilterPanelOpen = !state.moduleFilterPanelOpen;
                renderModulesView(container);
            };
        }

        // 類別篩選 checkbox
        document.querySelectorAll('.category-filter-checkbox').forEach(cb => {
            cb.onchange = (e) => {
                const catKey = e.target.dataset.cat;
                if (e.target.checked) {
                    state.moduleCategoryFilter.add(catKey);
                } else {
                    state.moduleCategoryFilter.delete(catKey);
                }
                renderModulesView(container);
            };
        });

        // 全選/全不選
        const selectAllBtn = document.getElementById('select-all-categories-btn');
        if (selectAllBtn) {
            selectAllBtn.onclick = () => {
                state.moduleCategoryFilter = new Set(categories.map(c => c.key));
                renderModulesView(container);
            };
        }
        const deselectAllBtn = document.getElementById('deselect-all-categories-btn');
        if (deselectAllBtn) {
            deselectAllBtn.onclick = () => {
                state.moduleCategoryFilter.clear();
                renderModulesView(container);
            };
        }

        // 分類標題點擊（收起/打開）
        document.querySelectorAll('.category-header').forEach(header => {

                if (e.target.closest('.collapse-all-btn')) return;
                const catKey = header.dataset.cat;
                if (state.moduleCollapsedCategories.has(catKey)) {
                    state.moduleCollapsedCategories.delete(catKey);
                } else {
                    state.moduleCollapsedCategories.add(catKey);
                }
                renderModulesView(container);
            };
        });

        document.querySelectorAll('.collapse-all-btn').forEach(btn => {

                    state.moduleCollapsedCategories.delete(catKey);
                } else {
                    state.moduleCollapsedCategories.add(catKey);
                }
                renderModulesView(container);
            };

        container.querySelectorAll('.module-item').forEach(el => {
            el.onclick = () => openModuleEditor(el.dataset.id, el.dataset.cat);
        });
    }

    function openModuleEditor(code, catKey) {
        const mod = state.moduleData[catKey].find(m => m.code === code);
        if (!mod) return;
        
        const loadAndEdit = async () => {
            if (!mod.rawContent) {
                document.getElementById('mask-status').innerText = 'FETCHING_MODULE...';
                document.getElementById('secure-mask').classList.remove('hidden-mask');
                mod.rawContent = await DriveAPI.getFileContent(mod.fileId);
                document.getElementById('secure-mask').classList.add('hidden-mask');
            }
            renderModuleEditorModal(mod);
        };
        loadAndEdit();
    }

        modal.classList.remove('hidden');
        modal.innerHTML = `

            </div>
            <div class="space-y-1"><label class="font-label-caps text-[10px] text-on-surface-variant">HOOK承接詞 (Transition Hook)</label><input type="text" id="hook-input" value="${tabData.hook || ''}" class="w-full bg-surface-container-high border border-outline text-on-surface px-2 py-1.5 rounded-sm font-data-md text-sm" placeholder="例：然而，他並未察覺暗處的視線..."></div>
            <div class="space-y-1"><label class="font-label-caps text-[10px] text-on-surface-variant">動作/劇情描述</label><textarea id="action-text" class="w-full bg-surface-container-high border border-outline text-on-surface px-2 py-1.5 rounded-sm font-data-md text-sm min-h-[80px]">${tabData.actionText}</textarea></div>
            <div class="space-y-2"><label class="font-label-caps text-[10px] text-on-surface-variant">出場人物 (Instances)</label>
                ${chars.map(c => `
                    <div class="glass-panel p-2 rounded-sm space-y-2">
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="char-check rounded text-primary-container" data-code="${c.id}" ${tabData.characters[c.id]?.checked ? 'checked' : ''}><span class="font-data-md text-sm">${c.name} ${c.oopCode ? '['+c.oopCode+']' : ''}</span></label>
                        <div class="char-settings ${tabData.characters[c.id]?.checked ? '' : 'hidden'} space-y-2 pl-6 border-l border-outline-variant">
                            ${modTypes.map(mt => {
                                const mods = state.moduleData[mt.key] || [];
                                const charSetting = tabData.characters[c.id]?.settings?.[mt.key] || {};
                                return `<div class="grid grid-cols-3 gap-1 items-center"><span class="font-label-caps text-[8px] text-on-surface-variant">${mt.label}</span><select class="mod-select col-span-2 bg-surface-container-high border border-outline text-on-surface px-1 py-1 rounded-sm font-data-md text-[10px]" data-char="${c.id}" data-type="${mt.key}"><option value="">(無)</option>${mods.map(m => `<option value="${m.code}" ${charSetting.name === m.code ? 'selected' : ''}>${m.name}</option>`).join('')}</select></div><div class="grid grid-cols-2 gap-1"><input type="text" placeholder="Must Execute" class="must-input bg-surface-container-high border border-outline text-on-surface px-1 py-1 rounded-sm font-data-md text-[10px]" data-char="${c.id}" data-type="${mt.key}" value="${charSetting.must || ''}"><input type="text" placeholder="Forbid" class="forbid-input bg-surface-container-high border border-outline text-on-surface px-1 py-1 rounded-sm font-data-md text-[10px]" data-char="${c.id}" data-type="${mt.key}" value="${charSetting.forbid || ''}"></div>`;
                            }).join('')}
                        </div>
                    </div>
                `).join('')}
            </div>
            <div class="pt-2 border-t border-outline-variant"><label class="font-label-caps text-[10px] text-on-surface-variant">段落設定繼承</label><div class="flex gap-2 mt-1"><select id="inherit-src" class="flex-1 bg-surface-container-high border border-outline text-on-surface px-2 py-1.5 rounded-sm font-data-md text-xs">${["起", "承", "轉", "合"].map((name, i) => i !== state.currentTab ? `<option value="${i}">從【${name}】帶入</option>` : '').join('')}</select><button id="inherit-btn" class="bg-surface-container-high text-on-surface px-3 py-1.5 rounded-sm font-label-caps text-xs border border-outline-variant">📥 帶入</button></div></div>
        `;
        tabContent.innerHTML = html;

        if (state.currentTab === 0) document.getElementById('prev-summary').oninput = (e) => state.outlineData.previousSummary = e.target.value;
        document.getElementById('scene-select').onchange = (e) => tabData.scene = e.target.value;
        document.getElementById('hook-input').oninput = (e) => tabData.hook = e.target.value;
        document.getElementById('action-text').oninput = (e) => tabData.actionText = e.target.value;

        tabContent.querySelectorAll('.char-check').forEach(cb => { cb.onchange = (e) => { const code = e.target.dataset.code; if (!tabData.characters[code]) tabData.characters[code] = { checked: false, settings: {} }; tabData.characters[code].checked = e.target.checked; renderTabContent(); }; });
        tabContent.querySelectorAll('.mod-select').forEach(sel => { sel.onchange = (e) => { const charCode = e.target.dataset.char; const type = e.target.dataset.type; if (!tabData.characters[charCode].settings[type]) tabData.characters[charCode].settings[type] = {}; tabData.characters[charCode].settings[type].name = e.target.value; }; });
        tabContent.querySelectorAll('.must-input').forEach(inp => { inp.oninput = (e) => { const charCode = e.target.dataset.char; const type = e.target.dataset.type; if (!tabData.characters[charCode].settings[type]) tabData.characters[charCode].settings[type] = {}; tabData.characters[charCode].settings[type].must = e.target.value; }; });
        tabContent.querySelectorAll('.forbid-input').forEach(inp => { inp.oninput = (e) => { const charCode = e.target.dataset.char; const type = e.target.dataset.type; if (!tabData.characters[charCode].settings[type]) tabData.characters[charCode].settings[type] = {}; tabData.characters[charCode].settings[type].forbid = e.target.value; }; });

        document.getElementById('inherit-btn').onclick = () => {
            const srcIdx = parseInt(document.getElementById('inherit-src').value);
            const srcTab = state.outlineData.tabs[srcIdx];
            tabData.scene = srcTab.scene; tabData.hook = srcTab.hook; tabData.actionText = srcTab.actionText;
            tabData.characters = JSON.parse(JSON.stringify(srcTab.characters));
            renderTabContent();
        };
    }

    function renderTriggersView(container) {
        const prompts = state.config.prompts || { "AUDIT": "【自我審計協議】\n請執行自我審計，檢查上述生成內容是否違反當前生效模組。" };
        const book = getCurrentBook();
        container.innerHTML = `
            <div class="p-gutter space-y-4 pb-40">
                <h2 class="font-label-caps text-sm text-primary-fixed-dim border-l-2 border-primary-container pl-2">自我思維觸發器</h2>
                <div class="grid grid-cols-2 gap-2">
                    ${Object.keys(prompts).map(key => `<button class="trigger-btn bg-surface-container-high text-on-surface p-3 rounded-sm font-label-caps text-[10px] border border-outline-variant flex flex-col items-center gap-1 active:bg-surface-bright" data-prompt="${key}"><span class="material-symbols-outlined text-primary-fixed-dim">psychology</span>${key}</button>`).join('')}
                </div>
                <h2 class="font-label-caps text-sm text-primary-fixed-dim border-l-2 border-primary-container pl-2 mt-6">大綱預覽與導出</h2>
                <div class="glass-panel p-3 rounded-sm"><pre id="outline-preview" class="font-data-md text-[10px] text-on-surface-variant whitespace-pre-wrap max-h-[300px] overflow-y-auto"></pre></div>
                <div class="grid grid-cols-2 gap-2">
                    <button id="refresh-preview" class="bg-surface-container-high text-on-surface py-2 rounded-sm font-label-caps text-xs border border-outline-variant">🔄 更新預覽</button>
                    <button id="copy-outline" class="bg-primary-container text-on-primary-fixed py-2 rounded-sm font-label-caps text-xs flex items-center justify-center gap-1 cyan-glow"><span class="material-symbols-outlined text-[16px]">content_copy</span> 複製全部大綱</button>
                </div>
            </div>
        `;
        document.querySelectorAll('.trigger-btn').forEach(btn => { btn.onclick = () => { navigator.clipboard.writeText(prompts[btn.dataset.prompt]); alert(`已複製 ${btn.dataset.prompt} 觸發器指令！`); }; });
        document.getElementById('refresh-preview').onclick = () => { document.getElementById('outline-preview').innerText = generateOutline(); };
        document.getElementById('copy-outline').onclick = () => { navigator.clipboard.writeText(generateOutline()); alert('大綱已複製到剪貼簿！'); };
        document.getElementById('outline-preview').innerText = generateOutline();
    }

    function generateOutline() {
        const d = state.outlineData;
        const book = getCurrentBook();
        let outline = `[CHAPTER_${d.chapter}_${d.version}]\n`;
        if (book) outline += `[BOOK_META]: 書名《${book.title}》 | 風格：${book.style} | 段落字數限制：${book.paragraphWordCount}字\n`;
        if (d.previousSummary) outline += `### 前章總結參考依據\n${d.previousSummary}\n\n`;
        outline += `### 本章核心事件\n${d.coreEvent}\n\n`;
        if (d.chapterSummaryRequirement) outline += `### 本章總結需求調整\n${d.chapterSummaryRequirement}\n\n`;

        const tabNames = ["起", "承", "轉", "合"];
        for (let i = 0; i < 4; i++) {
            const tab = d.tabs[i];
            outline += `【${tabNames[i]}】\n`;
            const sceneObj = book ? book.scenes.find(s => s.id === tab.scene) : null;
            if (sceneObj) outline += `- 全局場景：${sceneObj.name} ${sceneObj.oopCode ? '['+sceneObj.oopCode+']' : ''}\n`;
            if (tab.hook) outline += `- HOOK承接詞：${tab.hook}\n`;
            outline += "- 出場人物:\n";
            let hasChars = false;
            for (const charId in tab.characters) {
                const charData = tab.characters[charId];
                const charObj = book ? book.actors.find(a => a.id === charId) : null;
                if (charData.checked && charObj) {
                    hasChars = true;
                    outline += `  - [${charObj.name}] ${charObj.oopCode ? '['+charObj.oopCode+']' : ''}:\n`;
                    
                    if (charObj.linkedModules && charObj.linkedModules.length > 0) {
                        outline += `    - OOP 模組關聯 (Templates):\n`;
                        charObj.linkedModules.forEach(modCode => {
                            let modName = modCode;
                            for (const catKey in state.moduleData) {
                                const mod = state.moduleData[catKey].find(m => m.code === modCode);
                                if (mod) {
                                    modName = mod.name;
                                    break;
                                }
                            }
                            outline += `      - ${modName} [${modCode}]\n`;
                        });
                    }
                    
                    const labelMap = {};
                    state.config.outlineModTypes.forEach(mt => labelMap[mt.key] = mt.label);
                    for (const key in charData.settings) {
                        const s = charData.settings[key];
                        if (s.name) outline += `    - ${labelMap[key] || key}: ${s.name}\n`;
                        if (s.must) outline += `    - [MUST_EXECUTE (${labelMap[key] || key})]: ${s.must}\n`;
                        if (s.forbid) outline += `    - [FORBIDDEN_EXECUTE (${labelMap[key] || key})]: ${s.forbid}\n`;
                    }
                }
            }
            if (!hasChars) outline += "  - (無)\n";
            if (tab.actionText) outline += `- 全局動作描述：${tab.actionText}\n`;
            outline += "\n";
        }
        outline += `[SYSTEM_INSTRUCTION]: 請根據上述大綱與 OOP 實例模組生成正文，嚴格遵守段落字數限制，並在文末嚴格按照 <sd_prompt> 格式輸出帶權重的視覺提示詞。`;
        return outline;
    }

    document.getElementById('auth-btn').addEventListener('click', () => {
        if (!state.tokenClient) {
            alert('Google 登入服務尚未載入完成，請稍候片刻或檢查網路連線。');
            return;
        }
        if (gapi.client.getToken()) { performPostLoginActions(); return; }
        state.tokenClient.requestAccessToken({prompt: 'consent'});
    });
    document.getElementById('logout-btn').addEventListener('click', () => { localStorage.removeItem('tdf_access_token'); gapi.client.setToken(null); location.reload(); });
    document.querySelectorAll('.nav-btn').forEach(btn => { btn.onclick = () => { state.currentView = btn.dataset.view; renderCurrentView(); }; });
    
    function toggleNav(collapse) {
        const expanded = document.getElementById('nav-expanded');
        const collapsed = document.getElementById('nav-collapsed');
        const mainContent = document.getElementById('main-app-content');
        
        if (collapse) {
            expanded.style.display = 'none';
            collapsed.classList.remove('hidden');
            setTimeout(() => collapsed.classList.add('show'), 10);
            mainContent.classList.remove('mb-16');
            mainContent.classList.add('mb-2');
            state.navCollapsed = true;
        } else {
            collapsed.classList.remove('show');
            setTimeout(() => {
                collapsed.classList.add('hidden');
                expanded.style.display = 'flex';
            }, 250);
            mainContent.classList.add('mb-16');
            mainContent.classList.remove('mb-2');
            state.navCollapsed = false;
        }
    }
    document.getElementById('nav-collapse-btn').addEventListener('click', () => toggleNav(true));
    document.getElementById('nav-expand-btn').addEventListener('click', () => toggleNav(false));

    window.addEventListener('load', initGoogleApis);
</script>
</body>
</html>
