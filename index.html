<!DOCTYPE html>
<html lang="zh-Hant" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>天道流：大綱中央控制台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script async defer src="https://accounts.google.com/gsi/client"></script>
  <script async defer src="https://apis.google.com/js/api.js"></script>
  <style>
    body { background-color: #0d1515; color: #00f2ff; font-family: 'JetBrains Mono', monospace; }
    .auth-only { display: none; } /* 登入後才會移除此類別 */
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

  <!-- 初始極簡介面 -->
  <div id="initial-screen" class="text-center space-y-6">
    <h1 class="text-xl font-bold tracking-widest neon-text">TDC V5.0.4 :: SYSTEM_LOCKED</h1>
    <button id="auth-btn" class="border border-[#00f2ff] px-8 py-3 hover:bg-[#00f2ff] hover:text-[#0d1515] transition-all">
      授權登入 (INITIALIZE)
    </button>
  </div>

  <!-- 登入後才會顯示的主控台 (隱藏初始狀態) -->
  <div id="main-app-content" class="auth-only w-full max-w-md space-y-6">
    <header class="border-b border-[#2a3a3a] pb-4 flex justify-between items-center">
      <h1 class="text-sm font-bold tracking-wider" data-i18n="app_title">---</h1>
      <button onclick="location.reload()" class="text-xs text-gray-500 underline">重置系統</button>
    </header>

    <div class="space-y-4">
      <label class="block text-[10px] text-gray-400 uppercase" data-i18n="char_label">---</label>
      <select id="char-select" class="w-full bg-[#1a2626] border border-[#2a3a3a] p-3 text-sm"></select>
      
      <label class="block text-[10px] text-gray-400 uppercase" data-i18n="action_label">---</label>
      <select id="action-select" class="w-full bg-[#1a2626] border border-[#2a3a3a] p-3 text-sm"></select>
      
      <textarea id="prompt-editor" class="w-full h-32 bg-[#1a2626] border border-[#2a3a3a] p-3 text-sm" placeholder="等待指令..."></textarea>
      
      <button id="inject-btn" class="w-full bg-[#00f2ff] text-[#0d1515] py-3 font-bold text-sm">注入指令</button>
    </div>
  </div>

  <script>
    const TDF_CONFIG = {
        CLIENT_ID: '113481234677-vhtkocf6nsp7pm47figsdgm6vsdqlrea.apps.googleusercontent.com', 
        SCOPES: 'https://www.googleapis.com/auth/drive',
        WORKSPACE_ROOT: 'TianDao_Workspace',
        TARGET_FILE: 'config.json'
    };

    // 授權登入後才執行的主流程
    async function onAuthSuccess() {
        document.getElementById('initial-screen').style.display = 'none';
        document.getElementById('main-app-content').classList.remove('auth-only');
        await fetchSystemConfig();
    }

    async function fetchSystemConfig() {
        // ... (這裡放置您之前修正過的目錄尋訪邏輯與渲染邏輯)
        // 核心目標是透過 fetchSystemConfig() 將文字填充到 data-i18n 屬性的欄位
        console.log("資料已載入，介面更新完成。");
    }

    // 登入按鈕綁定
    document.getElementById('auth-btn').addEventListener('click', () => {
        const client = google.accounts.oauth2.initTokenClient({
            client_id: TDF_CONFIG.CLIENT_ID,
            scope: TDF_CONFIG.SCOPES,
            callback: (resp) => { if(!resp.error) onAuthSuccess(); }
        });
        client.requestAccessToken();
    });

    function renderUI(config) {
        if (!config) return;

        // 直接鎖定 ID 進行填充，不再依賴屬性掃描
        if (config.ui) {
            const titleEl = document.querySelector('h1[data-i18n="app_title"]');
            if (titleEl) titleEl.innerText = config.ui.app_title;
            
            const moduleLabel = document.querySelector('[data-i18n="module_label"]');
            if (moduleLabel) moduleLabel.innerText = config.ui.module_label;
            
            const projectTitle = document.querySelector('[data-i18n="project_title"]');
            if (projectTitle) projectTitle.innerText = config.ui.project_title;
        }

        // 填充下拉選單
        if (config.modules?.characters) {
            document.getElementById('char-select').innerHTML = config.modules.characters
                .map(c => typeof c === 'string' ? `<option value="${c}">${c}</option>` : `<option value="${c.id}">${c.name}</option>`)
                .join('');
        }
        
        if (config.modules?.scenes) {
            document.getElementById('scene-select').innerHTML = config.modules.scenes
                .map(s => typeof s === 'string' ? `<option value="${s}">${s}</option>` : `<option value="${s.id}">${s.name}</option>`)
                .join('');
        }

        // 重新渲染動作清單
        if (config.modules?.actions) {
            const actionSelect = document.getElementById('action-select');
            actionSelect.innerHTML = config.modules.actions.map(act => `<option value="${act.id}">${act.name}</option>`).join('');
        }

        console.log("介面已強制刷新，檢查 DOM 填充狀態");
    }

    // API 載入檢查
    function checkApiReady() {
        if (typeof gapi !== 'undefined' && typeof google !== 'undefined') return true;
        return false;
    }
  </script>
</body>
</html>
