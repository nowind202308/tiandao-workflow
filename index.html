.version-editor textarea:focus { outline: none; border-color: #00f2ff; }
.summary-block { background: rgba(21, 29, 30, 0.5); border: 1px dashed #3a494b; border-radius: 4px; padding: 12px; margin-top: 16px; }
.summary-block textarea { width: 100%; background: transparent; border: none; color: #dce4e4; font-size: 12px; resize: vertical; }
.summary-block textarea:focus { outline: none; }

<script>
const TDF_CONFIG = {
CLIENT_ID: '113481234677-vhtkocf6nsp7pm47figsdgm6vsdqlrea.apps.googleusercontent.com',
SCOPES: 'https://www.googleapis.com/auth/drive',
DISCOVERY_DOCS: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
WORKSPACE_ROOT: 'TianDao_Workspace',
CONFIG_FILE: 'TianDao_Config.json',
BOOKS_FILE: 'Books_Data.json'
};
const state = {
tokenClient: null, gapiInited: false, gisInited: false,
driveIds: { root: null, config: null },
config: null,
moduleData: {},
booksFileId: null,
books: [],
currentBookId: null,
currentBookTab: 'meta',
outlineData: {
chapter: '001', version: 'V1.0', coreEvent: '',
chapterSummaryRequirement: '', previousSummary: '',
tabs: Array(4).fill(null).map(() => ({ scene: '', hook: '', actionText: '', characters: {} }))
},
currentView: 'system',
currentTab: 0,
isInitialized: false,
navCollapsed: false,
moduleSearchQuery: '',
moduleCollapsedCategories: new Set(),
moduleVisibleCategories: new Set(),
moduleCategoriesInitialized: false,
selectedModules: new Set(),
tagFilter: null,
tagSearchQuery: '',
// 章節展開狀態管理
expandedChapters: new Set()
};

function handleTokenResponse(resp) {
if (resp.error !== undefined) {
console.error('Token error:', resp);
alert('登入失敗: ' + resp.error);
return;
}
localStorage.setItem('tdf_access_token', resp.access_token);
performPostLoginActions();
}
function attemptAutoLogin() {
if (state.gapiInited && state.gisInited) {
const savedToken = localStorage.getItem('tdf_access_token');
if (savedToken) {
gapi.client.setToken({ access_token: savedToken });
performPostLoginActions();
}
}
}
function initGoogleApis() {
if (typeof gapi === 'undefined' || typeof google === 'undefined' || !google.accounts) {
setTimeout(initGoogleApis, 200);
return;
}
gapi.load('client', async () => {
await gapi.client.init({ discoveryDocs: TDF_CONFIG.DISCOVERY_DOCS });
state.gapiInited = true;
attemptAutoLogin();
});
state.tokenClient = google.accounts.oauth2.initTokenClient({
client_id: TDF_CONFIG.CLIENT_ID, scope: TDF_CONFIG.SCOPES, callback: handleTokenResponse,
});
state.gisInited = true;
attemptAutoLogin();
}
async function performPostLoginActions() {
document.getElementById('auth-btn-text').innerText = 'AGENT_AUTH';
document.getElementById('auth-btn').classList.replace('bg-primary-container', 'bg-surface-container-highest');
document.getElementById('logout-btn').classList.remove('hidden');
document.getElementById('mask-status').innerText = 'LOCATING_WORKSPACE...';
state.driveIds.root = await DriveAPI.findId(TDF_CONFIG.WORKSPACE_ROOT, null, true);
if (!state.driveIds.root) {
const res = await DriveAPI.createFolder(TDF_CONFIG.WORKSPACE_ROOT, null);
state.driveIds.root = res.id;
}
document.getElementById('mask-status').innerText = 'CHECKING_CONFIG...';
const configId = await DriveAPI.findId(TDF_CONFIG.CONFIG_FILE, state.driveIds.root, false);
if (configId) {
state.driveIds.config = configId;
const content = await DriveAPI.getFileContent(configId);
state.config = JSON.parse(content);
state.isInitialized = true;
document.getElementById('mask-status').innerText = 'LOADING_MODULES...';
await ModuleLoader.loadAll(true);
} else {
alert('未找到 TianDao_Config.json，請先初始化環境。');
}
document.getElementById('mask-status').innerText = 'SYNCING_BOOKS...';
await loadBooksData();
document.getElementById('secure-mask').classList.add('hidden-mask');
document.getElementById('main-app-content').classList.add('unlocked');
renderCurrentView();
}
const DriveAPI = {
async findId(name, parentId = null, isFolder = true) {
const mime = isFolder ? "mimeType = 'application/vnd.google-apps.folder'" : "mimeType != 'application/vnd.google-apps.folder'";
let q = `name = '${name}' and ${mime} and trashed = false`;
if (parentId) q += ` and '${parentId}' in parents`;
const resp = await gapi.client.drive.files.list({ q: q, fields: 'files(id, name)' });
return resp.result.files.length > 0 ? resp.result.files[0].id : null;
},
async createFolder(name, parentId) {
const token = gapi.client.getToken().access_token;
const metadata = { name, parents: parentId ? [parentId] : [], mimeType: 'application/vnd.google-apps.folder' };
const resp = await fetch('https://www.googleapis.com/drive/v3/files', {
method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(metadata)
});
return resp.json();
},
async createFile(name, parentId, content) {
const token = gapi.client.getToken().access_token;
const metadata = { name, parents: parentId ? [parentId] : [], mimeType: 'application/json' };
const form = new FormData();
form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
form.append('file', new Blob([content], { type: 'application/json' }));
const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: form
});
return resp.json();
},
async getFileContent(fileId) {
const resp = await gapi.client.drive.files.get({ fileId: fileId, alt: 'media' });
return resp.body;
},
async updateFile(fileId, content) {
const token = gapi.client.getToken().access_token;
const metadata = { mimeType: 'application/json' };
const form = new FormData();
form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
form.append('file', new Blob([content], { type: 'application/json' }));
const resp = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`, {
method: 'PATCH', headers: { 'Authorization': `Bearer ${token}` }, body: form
});
return resp.json();
},
async listFiles(parentId) {
const q = `'${parentId}' in parents and trashed = false`;
const resp = await gapi.client.drive.files.list({ q: q, fields: 'files(id, name)' });
return resp.result.files || [];
}
};
async function loadBooksData() {
const fileId = await DriveAPI.findId(TDF_CONFIG.BOOKS_FILE, state.driveIds.root, false);
if (fileId) {
state.booksFileId = fileId;
const content = await DriveAPI.getFileContent(fileId);
state.books = JSON.parse(content);
if (state.books.length > 0 && !state.currentBookId) {
state.currentBookId = state.books[0].id;
}
} else {
state.books = [];
}
}
async function saveBooksData() {
const jsonStr = JSON.stringify(state.books, null, 2);
if (state.booksFileId) {
await DriveAPI.updateFile(state.booksFileId, jsonStr);
} else {
const res = await DriveAPI.createFile(TDF_CONFIG.BOOKS_FILE, state.driveIds.root, jsonStr);
state.booksFileId = res.id;
}
alert('書籍數據已同步至雲端！');
}
function getCurrentBook() {
return state.books.find(b => b.id === state.currentBookId);
}
function createNewBook() {
const name = prompt('請輸入新書名稱：');
if (!name) return;
const newBook = {
id: 'book_' + Date.now(),
title: name,
style: '賽博龐克 / 懸疑',
paragraphWordCount: 800,
actors: [],
scenes: [],
chapters: [{
id: 'c_' + Date.now(),
number: '001',
name: '第 001 章',
status: 'Draft',
sections: {
start: { activeVersionId: null, versions: [] },
continue: { activeVersionId: null, versions: [] },
turn: { activeVersionId: null, versions: [] },
end: { activeVersionId: null, versions: [] }
},
summary: ''
}],
outlinePromptConfig: { totalChapters: 10, mainActors: 3, wordCount: 5000 }
};
state.books.push(newBook);
state.currentBookId = newBook.id;
saveBooksData();
renderCurrentView();
}
function deleteCurrentBook() {
if (!confirm('確定要刪除當前書籍及其所有設定嗎？此操作不可復原。')) return;
state.books = state.books.filter(b => b.id !== state.currentBookId);
state.currentBookId = state.books.length > 0 ? state.books[0].id : null;
saveBooksData();
renderCurrentView();
}
const ModuleLoader = {
INDEX_FILE_NAME: 'Modules_Index.json',
parseModule(content, filename) {
const codeMatch = content.match(/^\s*\[MOD_ID\]\s*[:：]\s*([A-Za-z0-9_]+)/m);
const code = codeMatch ? codeMatch[1].trim() : filename.replace(/\.(txt|ahk)$/, '');
const nameMatch = content.match(/^\s*\[NAME\]\s*[:：]\s*(.+?)\s*$/m);
const name = nameMatch ? nameMatch[1].trim() : code;
const tagsMatch = content.match(/\[TAGS\]\s*[:：]\s*(.+)/i);
const tags = tagsMatch ? tagsMatch[1].split(',').map(t => t.trim()).filter(t => t) : [];
const extractField = (fieldName) => {
const regex = new RegExp(`^\\s*\\[${fieldName}\\]\\s*[:：]\\s*(.*?)(?=\\r?\
\\s*\\[|\\r?\
\\s*[A-Z_]+\\s*[:：]|$)`, 'ms');
const match = content.match(regex);
return match ? match[1].trim() : '';
};
return {
code, name, tags,
description: extractField('DESCRIPTION') || extractField('EFFECT') || extractField('CORE_CONCEPT'),
weight: parseFloat(extractField('WEIGHT')) || 0.5,
blockedBy: extractField('BLOCKED_BY') || extractField('BLOCKED_ACTIONS'),
alternatives: extractField('ALTERNATIVES'),
duration: extractField('DURATION_TTL') || extractField('DURATION'),
rawContent: content
};
},
async loadIndex() {
const indexFileId = await DriveAPI.findId(this.INDEX_FILE_NAME, state.driveIds.root, false);
if (!indexFileId) return null;
const content = await DriveAPI.getFileContent(indexFileId);
return JSON.parse(content);
},
buildStateFromIndex(indexData) {
state.moduleData = {};
if (!indexData.categories) return;
for (const [category, modules] of Object.entries(indexData.categories)) {
state.moduleData[category] = modules.map(mod => ({
code: mod.id,
name: mod.name,
fileId: mod.fileId,
category: category,
tags: mod.tags || [],
rawContent: null
}));
}
},
async buildAndSaveIndex() {
const configId = await DriveAPI.findId(TDF_CONFIG.CONFIG_FILE, state.driveIds.root, false);
if (configId) {
const content = await DriveAPI.getFileContent(configId);
state.config = JSON.parse(content);
}
const indexData = {
meta: {
version: "1.0",
last_updated: new Date().toISOString(),
total_modules: 0,
scanned_categories: 0
},
categories: {}
};
let totalModules = 0;
let scannedCategories = 0;
for (const cat of state.config.categories) {
let currentParentId = state.driveIds.root;
for (const folderName of cat.path) {
let folderId = await DriveAPI.findId(folderName, currentParentId, true);
if (!folderId) {
console.log(`[Index] 自動建立缺失資料夾: ${folderName}`);
const res = await DriveAPI.createFolder(folderName, currentParentId);
folderId = res.id;
}
currentParentId = folderId;
}
scannedCategories++;
const files = await DriveAPI.listFiles(currentParentId);
indexData.categories[cat.key] = [];
for (const file of files) {
const lowerName = file.name.toLowerCase();
if (lowerName.endsWith('.txt') && lowerName !== 'readme.txt') {
try {
const content = await DriveAPI.getFileContent(file.id);
const parsed = this.parseModule(content, file.name);
if (parsed.code) {
indexData.categories[cat.key].push({
id: parsed.code,
name: parsed.name,
fileId: file.id,
tags: parsed.tags
});
totalModules++;
} else {
console.warn(`[Index] 檔案 ${file.name} 解析失敗，未找到 [MOD_ID]`);
}
} catch (e) {
console.error(`[Index] 讀取檔案 ${file.name} 失敗`, e);
}
}
}
}
indexData.meta.total_modules = totalModules;
indexData.meta.scanned_categories = scannedCategories;
const jsonStr = JSON.stringify(indexData, null, 2);
const existingIndexId = await DriveAPI.findId(this.INDEX_FILE_NAME, state.driveIds.root, false);
if (existingIndexId) {
await DriveAPI.updateFile(existingIndexId, jsonStr);
} else {
await DriveAPI.createFile(this.INDEX_FILE_NAME, state.driveIds.root, jsonStr);
}
console.log(`[Index] 重建完成！掃描了 ${scannedCategories} 個分類，共索引 ${totalModules} 個模組。`);
return indexData;
},
async loadAll(useIndex = true) {
if (!state.config || !state.driveIds.root) return;
if (useIndex) {
const indexData = await this.loadIndex();
if (indexData) {
this.buildStateFromIndex(indexData);
return;
}
}
state.moduleData = {};
for (const cat of state.config.categories) {
let currentParentId = state.driveIds.root;
let validPath = true;
for (const folderName of cat.path) {
const id = await DriveAPI.findId(folderName, currentParentId, true);
if (!id) { validPath = false; break; }
currentParentId = id;
}
if (!validPath) continue;
const files = await DriveAPI.listFiles(currentParentId);
state.moduleData[cat.key] = [];
for (const file of files) {
const lowerName = file.name.toLowerCase();
if (lowerName.endsWith('.txt') && lowerName !== 'readme.txt') {
try {
const content = await DriveAPI.getFileContent(file.id);
const parsed = this.parseModule(content, file.name);
parsed.fileId = file.id;
parsed.category = cat.key;
state.moduleData[cat.key].push(parsed);
} catch (e) { console.error(`Error loading ${file.name}`, e); }
}
}
}
}
};
async function updateModuleTags(fileId, newTags) {
let content = await DriveAPI.getFileContent(fileId);
content = content.replace(/\[TAGS\]\s*[:：]\s*.+/i, '');
if (newTags.length > 0) {
content += `
[TAGS]: ${newTags.join(', ')}`;
}
await DriveAPI.updateFile(fileId, content);
for (const catKey in state.moduleData) {
const mod = state.moduleData[catKey].find(m => m.fileId === fileId);
if (mod) {
mod.tags = newTags;
break;
}
}
}
async function removeTagFromModule(fileId, tagToRemove) {
let content = await DriveAPI.getFileContent(fileId);
const tagsMatch = content.match(/\[TAGS\]\s*[:：]\s*(.+)/i);
let tags = [];
if (tagsMatch) {
tags = tagsMatch[1].split(',').map(t => t.trim()).filter(t => t && t !== tagToRemove);
content = content.replace(/\[TAGS\]\s*[:：]\s*.+/i, '');
}
if (tags.length > 0) {
content += `
[TAGS]: ${tags.join(', ')}`;
}
await DriveAPI.updateFile(fileId, content);
for (const catKey in state.moduleData) {
const mod = state.moduleData[catKey].find(m => m.fileId === fileId);
if (mod) {
mod.tags = tags;
break;
}
}
}

let currentId = await DriveAPI.findId(key, parentId, true);
if (!currentId) {
const res = await DriveAPI.createFolder(key, parentId);
currentId = res.id;

if (Array.isArray(value)) {
for (const fileName of value) {

const content = state.config.fileContents[fileName] || `// ${fileName} placeholder`;
await DriveAPI.createFile(fileName, currentId, content);
}
}
} else if (typeof value === 'object' && value !== null) {
await createStructure(value, currentId);
}
}
};

function normalizeChapter(chapter) {
if (!chapter.sections) {
chapter.sections = {
start: { activeVersionId: null, versions: [] },
continue: { activeVersionId: null, versions: [] },
turn: { activeVersionId: null, versions: [] },
end: { activeVersionId: null, versions: [] }
};
}
if (chapter.summary === undefined) chapter.summary = '';
// 確保每個 section 都有正確結構
['start', 'continue', 'turn', 'end'].forEach(key => {
if (!chapter.sections[key]) {
chapter.sections[key] = { activeVersionId: null, versions: [] };
}
if (!chapter.sections[key].versions) chapter.sections[key].versions = [];
});
return chapter;
}

function bindSectionEvents(container, book) {
// 新增版次
container.querySelectorAll('.add-version-btn').forEach(btn => {
btn.onclick = (e) => {
e.stopPropagation();
const cIdx = parseInt(btn.dataset.cidx);
const sectionKey = btn.dataset.section;
const section = book.chapters[cIdx].sections[sectionKey];
const newVersion = {
id: 'v_' + Date.now(),
code: `v${section.versions.length + 1}.0`,
rating: 0,
note: '',
outline: '',
content: '',
isEditing: true
};
// 複製前一版資料 (若有)
if (section.versions.length > 0) {
const lastV = section.versions[section.versions.length - 1];
newVersion.outline = lastV.outline || '';
newVersion.content = lastV.content || '';
}
section.versions.push(newVersion);
if (!section.activeVersionId) section.activeVersionId = newVersion.id;
renderChaptersView(container, book);
};
});

// 刪除版次
container.querySelectorAll('.delete-version-btn').forEach(btn => {
btn.onclick = (e) => {
e.stopPropagation();
const cIdx = parseInt(btn.closest('.version-list').dataset.cidx);
const sectionKey = btn.dataset.section;
const vIdx = parseInt(btn.dataset.vidx);
const section = book.chapters[cIdx].sections[sectionKey];
section.versions.splice(vIdx, 1);
if (section.activeVersionId && !section.versions.find(v => v.id === section.activeVersionId)) {
section.activeVersionId = section.versions.length > 0 ? section.versions[0].id : null;
}
renderChaptersView(container, book);
};
});

// 切換編輯狀態
container.querySelectorAll('.toggle-edit-btn').forEach(btn => {

e.stopPropagation();

const sectionKey = btn.dataset.section;
const vIdx = parseInt(btn.dataset.vidx);
book.chapters[cIdx].sections[sectionKey].versions[vIdx].isEditing = !book.chapters[cIdx].sections[sectionKey].versions[vIdx].isEditing;

});

container.querySelectorAll('.version-radio').forEach(radio => {

});

// 備註輸入 (直接更新 state，不重繪)
container.querySelectorAll('.version-note-input').forEach(input => {
input.oninput = (e) => {
const cIdx = parseInt(input.closest('.version-list').dataset.cidx);

// 大綱/內文輸入 (直接更新 state，不重繪)
container.querySelectorAll('.version-outline-input, .version-content-input').forEach(ta => {
ta.oninput = (e) => {
const cIdx = parseInt(ta.closest('.version-editor').dataset.cidx || ta.closest('.chapter-body').querySelector('.version-list').dataset.cidx);

} else {
book.chapters[listCIdx].sections[sectionKey].versions[vIdx].content = e.target.value;
}
};
});
}

function getAllModulesByCategory() {
const result = {};
for (const catKey in state.moduleData) {
result[catKey] = state.moduleData[catKey].map(m => ({
code: m.code,
name: m.name,
category: catKey
}));
}
return result;
}
function getCategoryLabel(catKey) {
if (!catKey) return '(未分類)';
const catConfig = state.config.categories.find(c => c.key === catKey);
return catConfig ? catConfig.label : catKey;
}
function getModuleName(moduleCode) {
if (!moduleCode) return '(未選擇)';
for (const catKey in state.moduleData) {
const mod = state.moduleData[catKey].find(m => m.code === moduleCode);
if (mod) return mod.name;
}
return moduleCode;
}
function ensureCharDataFormat(charData) {
if (!charData) return { checked: false, moduleRows: [] };
if (Array.isArray(charData.moduleRows)) {
return charData;
}
charData.moduleRows = [];
if (charData.settings && typeof charData.settings === 'object') {
for (const key in charData.settings) {
const s = charData.settings[key];
if (s && (s.name || s.must || s.forbid)) {
charData.moduleRows.push({
id: 'row_legacy_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
category: key,
moduleCode: s.name || '',
mustExecute: s.must || '',
forbid: s.forbid || '',
reason: ''
});
}
}
}
delete charData.settings;
return charData;
}
function renderModuleRow(row, rowIdx, charId) {
const allModulesByCategory = getAllModulesByCategory();
const categoryOptions = Object.keys(allModulesByCategory).map(catKey => {
const label = getCategoryLabel(catKey);
const count = allModulesByCategory[catKey].length;
return `<option value="${catKey}" ${row.category === catKey ? 'selected' : ''}>${label} (${count})</option>`;
}).join('');
const modsInCategory = allModulesByCategory[row.category] || [];
const moduleOptions = modsInCategory.map(m =>
`<option value="${m.code}" ${row.moduleCode === m.code ? 'selected' : ''}>${m.name} [${m.code}]</option>`
).join('');
return `

<div class="flex items-center justify-between mb-1">
<div class="flex items-center gap-2">
<span class="row-index">#${rowIdx + 1}</span>

</label>
<select class="row-category-select w-full bg-surface border border-outline text-on-surface px-2 py-1.5 rounded-sm font-data-md text-[10px]" data-char="${charId}" data-rowidx="${rowIdx}">

${categoryOptions}
</select>

function calculateCreativeSpaceMargin(charData) {
if (!charData) {
return '<span class="creative-space-margin high"><span class="emoji">🟢</span> 100%</span>';
}
charData = ensureCharDataFormat(charData);
const rows = charData.moduleRows || [];
const moduleCount = rows.filter(r => r.moduleCode).length;
const strictConstraints = rows.filter(r => r.mustExecute || r.forbid).length;
let percentage = 100 - (moduleCount * 10) - (strictConstraints * 5);
percentage = Math.max(20, Math.min(100, percentage));
let statusClass = 'medium';
let emoji = '';
let statusText = '平衡';
if (percentage >= 70) {
statusClass = 'high';
emoji = '🟢';
statusText = '高度自由';
} else if (percentage <= 40) {
statusClass = 'low';
emoji = '🔴';
statusText = '嚴格約束';
}
return `<span class="creative-space-margin ${statusClass}" title="創作空間裕度：${statusText}
模組數：${moduleCount}
約束數：${strictConstraints}"><span class="emoji">${emoji}</span> ${percentage}%</span>`;
}

function generateOutline() {
const d = state.outlineData;
const book = getCurrentBook();
let outline = `[CHAPTER_${d.chapter}_${d.version}]
`;
if (book) outline += `[BOOK_META]: 書名《${book.title}》 | 風格：${book.style} | 段落字數限制：${book.paragraphWordCount}字
`;
if (d.previousSummary) outline += `### 前章總結參考依據
${d.previousSummary}
`;
outline += `### 本章核心事件
${d.coreEvent}
`;
if (d.chapterSummaryRequirement) outline += `### 本章總結需求調整
${d.chapterSummaryRequirement}
`;
const tabNames = ["起", "承", "轉", "合"];
for (let i = 0; i < 4; i++) {
const tab = d.tabs[i];
outline += `【${tabNames[i]}】
`;
const sceneObj = book ? book.scenes.find(s => s.id === tab.scene) : null;
if (sceneObj) outline += `- 全局場景：${sceneObj.name} ${sceneObj.oopCode ? '['+sceneObj.oopCode+']' : ''}
`;
if (tab.hook) outline += `- HOOK承接詞：${tab.hook}
`;
outline += "- 出場人物:
";
let hasChars = false;
for (const charId in tab.characters) {
const charData = ensureCharDataFormat(tab.characters[charId]);
const charObj = book ? book.actors.find(a => a.id === charId) : null;
if (charData.checked && charObj) {
hasChars = true;
outline += `  - [${charObj.name}] ${charObj.oopCode ? '['+charObj.oopCode+']' : ''}:
`;
if (charObj.linkedModules && charObj.linkedModules.length > 0) {
outline += `    - OOP 模組關聯 (Templates - 全局基礎設定):
`;
charObj.linkedModules.forEach(modCode => {
let modName = modCode;
for (const catKey in state.moduleData) {
const mod = state.moduleData[catKey].find(m => m.code === modCode);
if (mod) {
modName = mod.name;
break;
}
}
outline += `      - ${modName} [${modCode}]
`;
});
}
if (charData.moduleRows && charData.moduleRows.length > 0) {
outline += `    - OUTLINE 模組表列設定 (優先級 > 全局 OOP):
`;
charData.moduleRows.forEach((row, idx) => {
const catLabel = getCategoryLabel(row.category);
const modName = getModuleName(row.moduleCode);
outline += `      - [表列 ${idx + 1}] 類別: ${catLabel}`;
if (row.moduleCode) {
outline += ` | 模組: ${modName} [${row.moduleCode}]`;
}
outline += `
`;
if (row.mustExecute) outline += `        - MUST EXECUTE: ${row.mustExecute}
`;
if (row.forbid) outline += `        - FORBID: ${row.forbid}
`;
if (row.reason) outline += `        - REASON (AI 生成提示方向): ${row.reason}
`;
});
}
}
}
if (!hasChars) outline += "  - (無)
";
if (tab.actionText) outline += `- 全局動作描述：${tab.actionText}
`;
outline += "
";
}
outline += `[SYSTEM_INSTRUCTION]: 請根據上述大綱與 OOP 實例模組生成正文。注意：OUTLINE 表列設定的優先級高於全局 OOP 模組，必須嚴格遵守。請根據 REASON 欄位理解每個模組的使用原因，將其轉化為角色的潛台詞與微表情（Show, don't tell）。嚴格遵守段落字數限制，並在文末嚴格按照 <sd_prompt> 格式輸出帶權重的視覺提示詞。`;
return outline;
}

if (collapse) {
expanded.style.display = 'none';
collapsed.classList.remove('hidden');

mainContent.classList.add('mb-2');
state.navCollapsed = true;
} else {
collapsed.classList.remove('show');
setTimeout(() => {
collapsed.classList.add('hidden');
expanded.style.display = 'flex';
}, 250);
mainContent.classList.add('mb-16');
mainContent.classList.remove('mb-2');
state.navCollapsed = false;
}
}
document.getElementById('nav-collapse-btn').addEventListener('click', () => toggleNav(true));
document.getElementById('nav-expand-btn').addEventListener('click', () => toggleNav(false));
window.addEventListener('load', initGoogleApis);
</script>
</body>
</html>
